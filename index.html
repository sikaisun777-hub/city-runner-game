<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星尘跑酷 v17</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(118, 77, 255, .30), transparent 28%),
        radial-gradient(circle at 84% 8%, rgba(255, 220, 96, .14), transparent 22%),
        linear-gradient(180deg, #08111f 0%, #040814 100%);
      user-select: none;
    }
    #gameWrap {
      position: relative;
      width: min(100vw, 520px);
      height: 100dvh;
      max-height: 920px;
      overflow: hidden;
      background: #071120;
      touch-action: none;
    }
    @media (min-width: 640px) {
      #gameWrap { height: min(96dvh, 920px); border-radius: 24px; border: 1px solid rgba(255,255,255,.12); box-shadow: 0 30px 100px rgba(0,0,0,.5); }
    }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .hud {
      position: absolute;
      top: 8px; left: 8px; right: 8px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      z-index: 10;
      pointer-events: none;
    }
    .box {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      padding: 6px 4px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .box small { display: block; font-size: 10px; color: rgba(255,255,255,.7); margin-bottom: 2px; }
    .box strong { font-size: 13px; font-weight: 900; line-height: 1.1; }
    .toast {
      position: absolute;
      top: 72px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 900;
      backdrop-filter: blur(12px);
      opacity: 0;
      z-index: 12;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { animation: toastShow 1.2s ease-out forwards; }
    @keyframes toastShow {
      0% { opacity: 0; transform: translate(-50%, -10px); }
      15%, 80% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }
    .dialogue {
      position: absolute;
      top: 110px; right: 8px;
      width: min(62%, 240px);
      min-height: 72px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      z-index: 11;
      opacity: 0;
      transform: translateY(-8px);
      transition: .18s ease;
      pointer-events: none;
    }
    .dialogue.show { opacity: 1; transform: translateY(0); }
    .dialogue .speaker { font-size: 12px; font-weight: 900; color: #ffe47e; margin-bottom: 4px; }
    .dialogue .line { font-size: 12px; line-height: 1.45; color: rgba(255,255,255,.92); }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(2,6,14,.62);
      backdrop-filter: blur(8px);
      z-index: 20;
    }
    .card {
      width: min(94%, 430px);
      padding: 24px 18px;
      border-radius: 26px;
      text-align: center;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 24px 70px rgba(0,0,0,.35);
    }
    .card h1 { margin: 0 0 10px; font-size: clamp(34px, 9vw, 54px); line-height: 1; letter-spacing: 1px; }
    .card p { margin: 10px auto 18px; line-height: 1.7; color: rgba(255,255,255,.86); font-size: 14px; }
    .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: #07101d;
      background: linear-gradient(90deg, #7cf6ff, #fff2a9, #ffd45a);
      box-shadow: 0 12px 30px rgba(255,211,94,.24);
    }
    button.secondary { color: #fff; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); box-shadow: none; }
    button.danger { color: #190810; background: linear-gradient(90deg, #ff5d74, #ffd35e); }
  </style>
</head>
<body>
  <main id="gameWrap">
    <canvas id="game"></canvas>
    <section class="hud">
      <div class="box"><small>分数</small><strong id="scoreEl">0</strong></div>
      <div class="box"><small>金币</small><strong id="coinEl">0</strong></div>
      <div class="box"><small>速度</small><strong id="speedEl">1.0x</strong></div>
      <div class="box"><small>状态</small><strong id="stateEl">跑酷</strong></div>
      <div class="box"><small>复活</small><strong id="reviveEl">1</strong></div>
    </section>
    <div class="toast" id="toast">提示</div>
    <div class="dialogue" id="dialogueBox"><div class="speaker" id="dialogueSpeaker">旁白</div><div class="line" id="dialogueLine">准备开始。</div></div>
    <section class="overlay" id="overlay">
      <div class="card">
        <h1>星尘跑酷</h1>
        <p>v17：替身护驾站位增强，双拳连续连打，挡火车有强冲击，红宝石触发替身登场动画。</p>
        <p>电脑：← → 移动，↑ 跳跃，按住 ↓ 下蹲。<br>手机：左右上下滑动。</p>
        <div class="row"><button id="startBtn">开始游戏</button></div>
      </div>
    </section>
  </main>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('gameWrap');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('scoreEl');
const coinEl = document.getElementById('coinEl');
const speedEl = document.getElementById('speedEl');
const stateEl = document.getElementById('stateEl');
const reviveEl = document.getElementById('reviveEl');
const toast = document.getElementById('toast');
const dialogueBox = document.getElementById('dialogueBox');
const dialogueSpeaker = document.getElementById('dialogueSpeaker');
const dialogueLine = document.getElementById('dialogueLine');
let W=0,H=0,DPR=1,running=false,gameOver=false,lastTime=0,worldTime=0;
let score=0,coins=0,speed=7,distance=0,revives=1;
let spawnTimer=0,coinTimer=0,powerTimer=0,bossCooldown=2200,bossTimer=0,bossAttackTimer=0,phase='run',bossType='knife';
let shieldTime=0,rubyTime=0,standTime=0,slowMoTime=0,reviveRiseTime=0,standIntroTime=0,impactTime=0;
let shakeTime=0,flashTime=0,crouchTapTime=0,standPunchTime=0,standBarrageTime=0,oraCount=0;
let objects=[],warnings=[],particles=[],texts=[],speedLines=[],impactRings=[];
let deathAnim=null,dialogueTimer=null;
const lanes=[-1,0,1];
const player={lane:0,laneX:0,y:0,baseY:0,vy:0,jumping:false,crouching:false,holdCrouch:false,dead:false};
function rand(a,b){return Math.random()*(b-a)+a} function pick(a){return a[Math.floor(Math.random()*a.length)]} function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function laneToX(lane){return W/2+lane*W*.25}
function resize(){const rect=wrap.getBoundingClientRect();DPR=Math.max(1,Math.min(devicePixelRatio||1,2));W=Math.floor(rect.width);H=Math.floor(rect.height);canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);player.baseY=H-120;if(!player.jumping&&!player.dead)player.y=player.baseY;draw()}
function project(lane,z){const horizon=H*.18,maxZ=H+200,t=clamp(1-z/maxZ,0,1),p=t*t,gap=W*(.05+.25*p);return{x:W/2+lane*gap,y:horizon+(H-horizon)*p,scale:.2+p*1.1,p}}
function showToast(text){toast.textContent=text;toast.classList.remove('show');void toast.offsetWidth;toast.classList.add('show')}
function showDialogue(speaker,line,duration=1500){dialogueSpeaker.textContent=speaker;dialogueLine.textContent=line;dialogueBox.classList.add('show');clearTimeout(dialogueTimer);dialogueTimer=setTimeout(()=>dialogueBox.classList.remove('show'),duration)}
function addText(x,y,text,color='#fff26a',size=28){texts.push({x,y,text,color,size,life:.7,vy:-1.8})}
function burst(x,y,color,count=14){for(let i=0;i<count;i++){const a=i/count*Math.PI*2;particles.push({x,y,vx:Math.cos(a)*rand(1.8,4.8),vy:Math.sin(a)*rand(1.8,4.8),life:rand(.35,.75),color})}}
function addImpact(x,y,big=false){impactRings.push({x,y,r:big?20:10,max:big?120:70,life:big?.55:.36,color:big?'#ffffff':'#b764ff'});if(big){flashTime=.16;shakeTime=.55}}
function updateHUD(){scoreEl.textContent=Math.floor(score);coinEl.textContent=coins;speedEl.textContent=(speed/7).toFixed(1)+'x';reviveEl.textContent=revives;let s='跑酷';if(phase==='boss')s=bossType==='knife'?'飞刀战':'绿弹幕';if(shieldTime>0)s='蓝盾';if(rubyTime>0)s='无敌';if(standTime>0)s='替身';if(player.dead)s='倒地';stateEl.textContent=s}
function resetGame(){running=false;gameOver=false;lastTime=0;worldTime=0;score=0;coins=0;speed=7;distance=0;revives=1;spawnTimer=300;coinTimer=420;powerTimer=1400;bossCooldown=2200;bossTimer=0;bossAttackTimer=0;phase='run';bossType='knife';shieldTime=0;rubyTime=0;standTime=0;slowMoTime=0;reviveRiseTime=0;standIntroTime=0;impactTime=0;shakeTime=0;flashTime=0;crouchTapTime=0;standPunchTime=0;standBarrageTime=0;oraCount=0;objects=[];warnings=[];particles=[];texts=[];speedLines=[];impactRings=[];deathAnim=null;player.lane=0;player.laneX=0;player.y=player.baseY;player.vy=0;player.jumping=false;player.crouching=false;player.holdCrouch=false;player.dead=false;updateHUD()}
function startGame(){resetGame();overlay.style.display='none';running=true;lastTime=performance.now();requestAnimationFrame(loop)}
function showHome(){overlay.innerHTML=`<div class="card"><h1>星尘跑酷</h1><p>v17：替身站在主角前方护驾，连续双拳格挡，挡火车有强冲击。</p><p>电脑：← → 移动，↑ 跳跃，按住 ↓ 下蹲。<br>手机：左右上下滑动。</p><div class="row"><button id="startAgainHome">开始游戏</button></div></div>`;overlay.style.display='grid';document.getElementById('startAgainHome').addEventListener('click',startGame)}
function showGameOver(){running=false;gameOver=true;overlay.innerHTML=`<div class="card"><h1>游戏结束</h1><p>分数：<strong>${Math.floor(score)}</strong><br>金币：<strong>${coins}</strong></p><div class="row">${revives>0?`<button class="danger" id="reviveBtn">复活一次</button>`:''}<button id="restartBtn">再玩一次</button><button class="secondary" id="homeBtn">回到首页</button></div></div>`;overlay.style.display='grid';const rb=document.getElementById('reviveBtn');if(rb)rb.addEventListener('click',reviveGame);document.getElementById('restartBtn').addEventListener('click',startGame);document.getElementById('homeBtn').addEventListener('click',showHome)}
function reviveGame(){if(revives<=0)return;revives--;player.dead=false;player.lane=0;player.laneX=0;player.y=player.baseY;player.vy=0;player.jumping=false;player.crouching=false;player.holdCrouch=false;phase='run';bossTimer=0;bossAttackTimer=0;deathAnim=null;warnings=[];objects=objects.filter(o=>['coin','shield','ruby'].includes(o.type));shieldTime=Math.max(shieldTime,3.5);reviveRiseTime=1;flashTime=.2;overlay.style.display='none';showToast('复活成功！');showDialogue('冷面跑者','还没结束。',1200);running=true;gameOver=false;lastTime=performance.now();updateHUD();requestAnimationFrame(loop)}
function moveLeft(){if(!running||player.dead)return;player.lane=Math.max(-1,player.lane-1)} function moveRight(){if(!running||player.dead)return;player.lane=Math.min(1,player.lane+1)}
function jump(){if(!running||player.dead)return;if(!player.jumping&&!player.crouching){player.vy=-16.5;player.jumping=true}}
function tapCrouch(){if(!running||player.dead)return;if(!player.jumping)crouchTapTime=.45} function startHoldCrouch(){if(!running||player.dead)return;if(!player.jumping)player.holdCrouch=true} function stopHoldCrouch(){player.holdCrouch=false}
function spawnObstacle(){const r=Math.random();let type=r<.18?'train':r<.38?'lowbar':r<.68?'cone':'barrier';const lane=pick(lanes);objects.push({type,lane,z:H+210,hit:false});if(Math.random()<.16){const other=pick(lanes.filter(l=>l!==lane));objects.push({type:Math.random()<.6?'cone':'barrier',lane:other,z:H+310,hit:false})}}
function spawnCoinLine(){const lane=pick(lanes),count=5+Math.floor(Math.random()*4);for(let i=0;i<count;i++)objects.push({type:'coin',lane,z:H+120+i*68,hit:false,bob:Math.random()*9})}
function spawnPowerup(){const lane=pick(lanes),type=Math.random()<.65?'shield':'ruby';objects.push({type,lane,z:H+180,hit:false})}
function startBoss(type){phase='boss';bossType=type;bossTimer=0;bossAttackTimer=70;warnings=[];objects=objects.filter(o=>['coin','shield','ruby'].includes(o.type));if(type==='knife'){showToast('Boss：飞刀战');showDialogue('金色恶影','飞刀封道，小心空路。',1600)}else{showToast('Boss：绿弹幕');showDialogue('绿色替身','看准空路，穿过去。',1600)}}
function maybeStartBoss(dt){if(phase!=='run')return;bossCooldown-=dt*speed*60;if(score>1200&&bossCooldown<=0){startBoss(Math.random()<.5?'knife':'emerald');bossCooldown=4200+Math.random()*1600}}
function spawnBossWave(){const safe=pick(lanes),blocked=lanes.filter(l=>l!==safe),z=H+200;blocked.forEach((lane,i)=>{warnings.push({lane,z:z+i*16,life:.9,color:bossType==='knife'?'#ffd25e':'#62ff9f'});objects.push({type:bossType==='knife'?'knife':'emerald',lane,z:z+170+i*16,hit:false})})}
function checkCollision(obj){const p=project(obj.lane,obj.z);const laneClose=Math.abs(obj.lane-player.laneX)<.38,near=Math.abs(p.y-player.y)<56;if(!laneClose||!near)return false;if(['coin','shield','ruby'].includes(obj.type))return true;if(obj.type==='lowbar')return !player.crouching;if(obj.type==='barrier'||obj.type==='cone')return !player.jumping;if(['train','knife','emerald'].includes(obj.type))return true;return false}
function triggerDeath(kind){if(player.dead)return;player.dead=true;const x=laneToX(player.laneX),y=player.y;if(kind==='train'){deathAnim={kind:'train',t:0,x,y,vx:rand(-4,4),vy:-16,rot:0,spin:rand(-14,14)};showToast('被火车创飞了！');showDialogue('旁白','列车正面撞上，整个人被掀飞！',1600);shakeTime=.8;flashTime=.18}else{deathAnim={kind:'trip',t:0,x,y,vx:rand(-2,2),vy:-7,rot:0,spin:rand(-9,9)};showToast('被绊倒了！');showDialogue('旁白','脚下一乱，向前翻滚倒地。',1600);shakeTime=.4;flashTime=.08}}
function handleCollision(obj){const p=project(obj.lane,obj.z);if(obj.type==='coin'){obj.hit=true;coins++;score+=25;burst(p.x,p.y,'#ffd95e',10);return}if(obj.type==='shield'){obj.hit=true;shieldTime=8;showToast('蓝色护盾启动！');showDialogue('蓝色护盾','8 秒内抵挡前方伤害。',1400);burst(p.x,p.y,'#4ea3ff',16);return}if(obj.type==='ruby'){obj.hit=true;rubyTime=8;standTime=8;standIntroTime=.9;slowMoTime=.9;oraCount=0;showToast('替身能力！');showDialogue('替身能力','护卫登场，挡下前方攻击！',1700);burst(p.x,p.y,'#ff5c72',18);burst(p.x,p.y,'#b764ff',18);return}
 if(standTime>0){obj.hit=true;standPunchTime=.28;standBarrageTime=obj.type==='train'?.75:.36;oraCount++;score+=obj.type==='train'?260:100;burst(p.x,p.y,'#b764ff',22);burst(p.x,p.y,'#ffffff',12);addImpact(p.x,p.y,obj.type==='train');addText(p.x,p.y,oraCount>=3?'オラオラ!':'オラ!','#fff26a',obj.type==='train'?34:28);showToast(obj.type==='train'?'替身重拳挡下火车！':'替身双拳格挡！');return}
 if(rubyTime>0){obj.hit=true;score+=obj.type==='train'?180:70;burst(p.x,p.y,'#ff6670',16);showToast('无敌冲撞！');return}
 if(shieldTime>0){obj.hit=true;score+=30;burst(p.x,p.y,'#4ea3ff',16);addText(p.x,p.y,'蓝盾格挡','#9ad3ff',22);showToast('蓝盾格挡！');return}
 obj.hit=true;triggerDeath(obj.type==='train'?'train':'trip')}
function updateObjects(rawDt,dt){for(let i=objects.length-1;i>=0;i--){const obj=objects[i],move=(obj.type==='knife'||obj.type==='emerald')?speed*1.06:speed;obj.z-=move*dt*60;if(!obj.hit&&checkCollision(obj))handleCollision(obj);if(obj.z<-180||obj.hit)objects.splice(i,1)}}
function updateEffects(rawDt,dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.life-=rawDt;if(p.life<=0)particles.splice(i,1)}for(let i=texts.length-1;i>=0;i--){const t=texts[i];t.y+=t.vy*dt*60;t.life-=rawDt;if(t.life<=0)texts.splice(i,1)}for(let i=warnings.length-1;i>=0;i--){const w=warnings[i];w.life-=rawDt;w.z-=speed*dt*60;if(w.life<=0||w.z<-100)warnings.splice(i,1)}for(let i=impactRings.length-1;i>=0;i--){const r=impactRings[i];r.r+=(r.max-r.r)*.18;r.life-=rawDt;if(r.life<=0)impactRings.splice(i,1)}if(Math.random()<.32)speedLines.push({x:rand(0,W),y:rand(0,H*.55),len:rand(35,90),life:.25});for(let i=speedLines.length-1;i>=0;i--){const l=speedLines[i];l.life-=rawDt;l.y+=speed*dt*60;if(l.life<=0)speedLines.splice(i,1)}}
function update(rawDt){worldTime+=rawDt;let dt=slowMoTime>0?rawDt*.42:rawDt;shieldTime=Math.max(0,shieldTime-rawDt);rubyTime=Math.max(0,rubyTime-rawDt);standTime=Math.max(0,standTime-rawDt);slowMoTime=Math.max(0,slowMoTime-rawDt);reviveRiseTime=Math.max(0,reviveRiseTime-rawDt);standIntroTime=Math.max(0,standIntroTime-rawDt);impactTime=Math.max(0,impactTime-rawDt);shakeTime=Math.max(0,shakeTime-rawDt);flashTime=Math.max(0,flashTime-rawDt);standPunchTime=Math.max(0,standPunchTime-rawDt);standBarrageTime=Math.max(0,standBarrageTime-rawDt);crouchTapTime=Math.max(0,crouchTapTime-rawDt);player.crouching=player.holdCrouch||crouchTapTime>0;if(player.dead&&deathAnim){deathAnim.t+=rawDt;deathAnim.x+=deathAnim.vx*rawDt*60;deathAnim.y+=deathAnim.vy*rawDt*60;deathAnim.vy+=.88*rawDt*60;deathAnim.rot+=deathAnim.spin*rawDt*60;updateEffects(rawDt,dt);if(deathAnim.t>1.05)showGameOver();return}
 speed=Math.min(18,speed+dt*.13);distance+=speed*dt*60;score+=speed*dt*6;player.laneX+=(player.lane-player.laneX)*Math.min(1,dt*12);if(player.jumping){player.y+=player.vy*dt*60;player.vy+=.72*dt*60;if(player.y>=player.baseY){player.y=player.baseY;player.vy=0;player.jumping=false}}else player.y=player.baseY;if(phase==='run'){maybeStartBoss(dt);spawnTimer-=dt*speed*60;coinTimer-=dt*speed*60;powerTimer-=dt*speed*60;if(spawnTimer<=0){spawnObstacle();spawnTimer=650+Math.random()*480-speed*18}if(coinTimer<=0){spawnCoinLine();coinTimer=750+Math.random()*700}if(powerTimer<=0){spawnPowerup();powerTimer=1900+Math.random()*1600}}else if(phase==='boss'){bossTimer+=rawDt;bossAttackTimer-=dt*speed*60;if(bossAttackTimer<=0){spawnBossWave();bossAttackTimer=bossType==='knife'?560+Math.random()*220:520+Math.random()*220}if(bossTimer>8.5){phase='run';showToast('Boss 退场！');showDialogue('冷面跑者','继续前进。',1200)}}updateObjects(rawDt,dt);updateEffects(rawDt,dt);updateHUD()}
function loop(ts){if(!running)return;const rawDt=Math.min((ts-lastTime)/1000,.033);lastTime=ts;update(rawDt);draw();if(running)requestAnimationFrame(loop)}
function roundRect(x,y,w,h,r){const rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath()}
function drawWorld(){const horizon=H*.18;const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#16244b');sky.addColorStop(.42,'#0a1834');sky.addColorStop(1,'#040812');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);for(let i=0;i<36;i++){const x=(i*97+distance*.05)%(W+70)-35,y=18+(i*43%Math.floor(H*.22));ctx.fillStyle=`rgba(255,255,255,${.18+(i%4)*.12})`;ctx.fillRect(x,y,2,2)}ctx.fillStyle='rgba(255,226,121,.82)';ctx.beginPath();ctx.arc(W*.83,H*.09,W*.04,0,Math.PI*2);ctx.fill();for(let side of[-1,1])for(let i=0;i<9;i++){const bw=W*.1+(i%3)*8,bh=65+(i*29)%120,x=side<0?i*bw*.65-20:W-i*bw*.65-bw+20,y=horizon-bh+24;ctx.fillStyle=i%2?'#0c1630':'#132248';ctx.fillRect(x,y,bw,bh);ctx.fillStyle='rgba(255,215,109,.22)';for(let r=0;r<5;r++)for(let c=0;c<2;c++)ctx.fillRect(x+12+c*24,y+12+r*18,7,8)}ctx.beginPath();ctx.moveTo(W*.38,horizon);ctx.lineTo(W*.62,horizon);ctx.lineTo(W*1.05,H+70);ctx.lineTo(-W*.05,H+70);ctx.closePath();const road=ctx.createLinearGradient(0,horizon,0,H);road.addColorStop(0,'#172138');road.addColorStop(1,'#2c3854');ctx.fillStyle=road;ctx.fill();for(let lane of[-1,0,1])for(let rail of[-.18,.18]){const a=project(lane+rail,H),b=project(lane+rail,-40);ctx.strokeStyle='rgba(160,200,240,.34)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}for(let z=H+140-(distance%92);z>-120;z-=92){const p=project(0,z);ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=2+p.scale;ctx.beginPath();ctx.moveTo(W/2-W*.42*p.p,p.y);ctx.lineTo(W/2+W*.42*p.p,p.y);ctx.stroke()}ctx.setLineDash([12,18]);ctx.lineDashOffset=-distance*.7;for(let lane of[-.5,.5]){const a=project(lane,H),b=project(lane,-40);ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}ctx.setLineDash([]);for(let z=H+110-(distance%120);z>-100;z-=120){const p=project(0,z);ctx.fillStyle=`rgba(255,214,94,${.12+p.p*.32})`;ctx.beginPath();ctx.ellipse(W*.12,p.y,18*p.scale,6*p.scale,0,0,Math.PI*2);ctx.ellipse(W*.88,p.y,18*p.scale,6*p.scale,0,0,Math.PI*2);ctx.fill()}}
function drawWarnings(){warnings.forEach(w=>{const p=project(w.lane,w.z);if(p.y<H*.16||p.y>H+80)return;ctx.save();ctx.globalAlpha=clamp(w.life/.9,0,1)*.75;ctx.fillStyle=w.color;ctx.beginPath();ctx.ellipse(p.x,p.y,40*p.scale,16*p.scale,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font=`900 ${13*p.scale}px system-ui`;ctx.textAlign='center';ctx.fillText('危险',p.x,p.y+4*p.scale);ctx.restore()})}
function drawCoin(p,o){const r=13*p.scale,b=Math.sin(worldTime*6+o.bob)*4*p.scale;ctx.save();ctx.translate(p.x,p.y+b);ctx.fillStyle='#ffd95e';ctx.beginPath();ctx.ellipse(0,0,r*.7,r,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.fillStyle='rgba(80,50,0,.28)';ctx.fillRect(-r*.1,-r*.56,r*.2,r*1.12);ctx.restore()}
function drawPower(p,label,color){const s=40*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor=color;ctx.shadowBlur=18*p.scale;ctx.fillStyle=color;roundRect(-s/2,-s/2,s,s,12*p.scale);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#08101d';ctx.font=`900 ${18*p.scale}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,0,1);ctx.restore()}
function drawBarrier(p,cone=false){const w=58*p.scale,h=42*p.scale;ctx.save();ctx.translate(p.x,p.y);if(cone){ctx.fillStyle='#ff8c2a';ctx.beginPath();ctx.moveTo(0,-h*.75);ctx.lineTo(w*.46,h*.45);ctx.lineTo(-w*.46,h*.45);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.78)';ctx.fillRect(-w*.28,h*.02,w*.56,h*.12)}else{ctx.fillStyle='#ffb13b';ctx.fillRect(-w/2,-h/2,w,h);ctx.fillStyle='rgba(80,38,0,.34)';ctx.fillRect(-w/2,-h*.08,w,h*.16);ctx.fillStyle='rgba(255,255,255,.58)';ctx.fillRect(-w*.34,-h*.34,w*.68,h*.15)}ctx.restore()}
function drawLowbar(p){const w=86*p.scale,h=70*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.strokeStyle='#ffcc66';ctx.lineWidth=7*p.scale;ctx.beginPath();ctx.moveTo(-w/2,h/2);ctx.lineTo(-w/2,-h/2);ctx.lineTo(w/2,-h/2);ctx.lineTo(w/2,h/2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(-w*.32,-h*.58,w*.64,h*.14);ctx.restore()}
function drawTrain(p){const w=88*p.scale,h=136*p.scale;ctx.save();ctx.translate(p.x,p.y-h*.18);ctx.fillStyle='#8d2036';roundRect(-w/2,-h/2,w,h,12*p.scale);ctx.fill();ctx.fillStyle='#ea5064';roundRect(-w*.43,-h*.43,w*.86,h*.86,10*p.scale);ctx.fill();ctx.fillStyle='rgba(160,240,255,.76)';ctx.fillRect(-w*.3,-h*.3,w*.6,h*.22);ctx.fillStyle='#ffd25e';ctx.beginPath();ctx.arc(-w*.25,h*.32,6*p.scale,0,Math.PI*2);ctx.arc(w*.25,h*.32,6*p.scale,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawEmerald(p){const r=22*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(worldTime*2);ctx.shadowColor='#62ff9f';ctx.shadowBlur=18*p.scale;ctx.fillStyle='#62ff9f';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.9,-r*.2);ctx.lineTo(r*.55,r);ctx.lineTo(-r*.55,r);ctx.lineTo(-r*.9,-r*.2);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.restore()}
function drawKnife(p){const s=44*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(-.45);ctx.fillStyle='#dfe8ff';ctx.beginPath();ctx.moveTo(-s*.55,-s*.12);ctx.lineTo(s*.35,-s*.12);ctx.lineTo(s*.65,0);ctx.lineTo(s*.35,s*.12);ctx.lineTo(-s*.55,s*.12);ctx.closePath();ctx.fill();ctx.fillStyle='#472660';ctx.fillRect(-s*.78,-s*.17,s*.25,s*.34);ctx.restore()}
function drawRuby(p){const r=24*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(worldTime*2.2);ctx.shadowColor='#ff4d5a';ctx.shadowBlur=20*p.scale;ctx.fillStyle='#ff4d5a';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.82,-r*.18);ctx.lineTo(r*.55,r);ctx.lineTo(-r*.55,r);ctx.lineTo(-r*.82,-r*.18);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.86)';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.fillStyle='rgba(255,255,255,.94)';ctx.font=`900 ${12*p.scale}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('力',0,2*p.scale);ctx.restore()}
function drawObjects(){const sorted=[...objects].sort((a,b)=>b.z-a.z);for(const obj of sorted){const p=project(obj.lane,obj.z);if(p.y<H*.15||p.y>H+120)continue;if(obj.type==='coin')drawCoin(p,obj);else if(obj.type==='shield')drawPower(p,'盾','#4ea3ff');else if(obj.type==='ruby')drawRuby(p);else if(obj.type==='train')drawTrain(p);else if(obj.type==='lowbar')drawLowbar(p);else if(obj.type==='knife')drawKnife(p);else if(obj.type==='emerald')drawEmerald(p);else drawBarrier(p,obj.type==='cone')}}
function drawPixelHeroAt(x,y,giant=1,crouch=1){ctx.save();ctx.translate(x,y);ctx.scale(giant,giant*crouch);if(shieldTime>0){ctx.strokeStyle='rgba(78,163,255,.95)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,-35,40,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(78,163,255,.12)';ctx.beginPath();ctx.arc(0,-35,40,0,Math.PI*2);ctx.fill()}if(rubyTime>0){ctx.strokeStyle='rgba(255,88,102,.92)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,-38,56,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,88,102,.08)';ctx.beginPath();ctx.arc(0,-38,56,0,Math.PI*2);ctx.fill()}const ox=-24,oy=-86;function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(ox+x,oy+y,w,h)}rect(12,0,24,4,'#101018');rect(8,4,36,4,'#101018');rect(16,8,20,4,'#232036');rect(36,8,8,4,'#101018');rect(16,12,20,4,'#efc18e');rect(16,16,20,4,'#e4ae7c');rect(20,20,12,4,'#efc18e');rect(12,12,8,4,'#101018');rect(36,12,8,4,'#101018');rect(22,16,4,4,'#111');rect(32,16,4,4,'#111');rect(12,24,28,8,'#241a46');rect(8,32,36,8,'#34216b');rect(8,40,36,8,'#4f34a7');rect(8,48,36,8,'#4f34a7');rect(8,56,36,8,'#3a247a');rect(8,64,36,8,'#2b1c5e');rect(4,32,8,20,'#241a46');rect(44,32,8,20,'#241a46');rect(4,52,8,8,'#efc18e');rect(44,52,8,8,'#efc18e');rect(16,72,8,16,'#1d2440');rect(32,72,8,16,'#1d2440');rect(12,88,12,4,'#d7e2ff');rect(32,88,12,4,'#d7e2ff');ctx.fillStyle='#ffd95e';ctx.font='900 12px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',ox+24,oy+38);ctx.restore()}
function drawPlayer(){if(player.dead&&deathAnim){drawDeathPlayer();return}const x=laneToX(player.laneX);let y=player.y;if(reviveRiseTime>0)y-=Math.sin((1-reviveRiseTime)*Math.PI)*16;drawPixelHeroAt(x,y,rubyTime>0?1.75:1,player.crouching?.72:1)}
function drawDeathPlayer(){const d=deathAnim;ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot*Math.PI/180);ctx.globalAlpha=Math.max(.25,1-d.t*.36);drawPixelHeroAt(0,0,1,1);ctx.restore()}
function drawStand(){if(standTime<=0||player.dead)return;const px=laneToX(player.laneX),py=player.y;let sx=px,sy=py-122;const enter=standIntroTime>0?(standIntroTime/.9):0;sy-=enter*55;const scale=(rubyTime>0?2.28:2.08)*(1+enter*.18);const sway=Math.sin(worldTime*6)*.04,bob=Math.sin(worldTime*5.2)*4;let punch=0;if(standPunchTime>0){const t=1-standPunchTime/.28;punch=Math.sin(t*Math.PI)*26}const barrage=standBarrageTime>0;ctx.save();ctx.translate(sx,sy+bob);ctx.scale(scale,scale);ctx.rotate(sway);ctx.globalAlpha=.96;ctx.shadowColor='#b764ff';ctx.shadowBlur=18;ctx.fillStyle='rgba(183,100,255,.16)';ctx.beginPath();ctx.ellipse(0,-18,28,44,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#0f0f14';roundRect(-15,-58,30,18,8);ctx.fill();roundRect(-18,-46,9,36,6);ctx.fill();roundRect(9,-46,9,36,6);ctx.fill();roundRect(-13,-40,26,28,8);ctx.fill();ctx.fillStyle='#c893ff';roundRect(-10,-49,20,16,8);ctx.fill();ctx.fillStyle='#8e47ff';roundRect(-24,-28,48,18,10);ctx.fill();ctx.fillStyle='#9e5aff';roundRect(-18,-12,36,36,12);ctx.fill();ctx.fillStyle='rgba(255,255,255,.14)';roundRect(-5,-6,10,18,5);ctx.fill();ctx.fillStyle='#7a37e8';roundRect(-13,22,26,12,7);ctx.fill();ctx.fillStyle='#c798ff';roundRect(-12,34,10,24,6);ctx.fill();roundRect(2,34,10,24,6);ctx.fill();ctx.fillStyle='#efefef';roundRect(-14,56,13,6,3);ctx.fill();roundRect(1,56,13,6,3);ctx.fill();ctx.fillStyle='#a96dff';roundRect(-28,-14,10,18,6);ctx.fill();roundRect(18,-14,10,18,6);ctx.fill();ctx.fillStyle='#bb83ff';roundRect(-36-punch,-6,18+punch,10,6);ctx.fill();roundRect(18,-6,18+punch,10,6);ctx.fill();ctx.fillStyle='#f1d8ff';roundRect(-42-punch,-8,10,14,4);ctx.fill();roundRect(32+punch,-8,10,14,4);ctx.fill();ctx.fillStyle='#ffd95e';ctx.font='900 10px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',-16,-18);ctx.fillText('★',16,-18);if(standPunchTime>0)drawStandPunchFX(punch);if(barrage)drawBarrageFX();if(enter>0){ctx.strokeStyle=`rgba(183,100,255,${enter*.7})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-12,55*(1-enter*.3),0,Math.PI*2);ctx.stroke()}ctx.restore()}
function drawStandPunchFX(punch){ctx.save();ctx.strokeStyle='rgba(255,255,255,.88)';ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(-42-punch,-5);ctx.lineTo(-64-punch,-11);ctx.moveTo(-42-punch,0);ctx.lineTo(-68-punch,0);ctx.moveTo(-42-punch,5);ctx.lineTo(-64-punch,11);ctx.stroke();ctx.beginPath();ctx.moveTo(42+punch,-5);ctx.lineTo(64+punch,-11);ctx.moveTo(42+punch,0);ctx.lineTo(68+punch,0);ctx.moveTo(42+punch,5);ctx.lineTo(64+punch,11);ctx.stroke();ctx.strokeStyle='rgba(183,100,255,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-1,34+punch*.2,Math.PI*.16,Math.PI*.84);ctx.stroke();ctx.restore()}
function drawBarrageFX(){ctx.save();ctx.strokeStyle='rgba(255,255,255,.72)';ctx.lineWidth=1.7;for(let i=0;i<8;i++){const off=Math.sin(worldTime*22+i)*8;ctx.beginPath();ctx.moveTo(-50-i*4,-18+i*5+off*.08);ctx.lineTo(-75-i*8,-20+i*5+off);ctx.moveTo(50+i*4,-18+i*5-off*.08);ctx.lineTo(75+i*8,-20+i*5-off);ctx.stroke()}ctx.restore()}
function drawParticles(){for(const p of particles){ctx.globalAlpha=clamp(p.life/.75,0,1);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3.8,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawTexts(){for(const t of texts){ctx.globalAlpha=clamp(t.life/.7,0,1);ctx.font=`1000 ${t.size}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineWidth=4;ctx.strokeStyle='#6f2ef0';ctx.strokeText(t.text,t.x,t.y);ctx.fillStyle=t.color;ctx.fillText(t.text,t.x,t.y)}ctx.globalAlpha=1}
function drawImpacts(){for(const r of impactRings){ctx.globalAlpha=clamp(r.life/.55,0,1);ctx.strokeStyle=r.color==='white'?'rgba(255,255,255,.7)':'rgba(183,100,255,.55)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=1}
function drawSpeedLines(){ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;for(const l of speedLines){ctx.globalAlpha=clamp(l.life/.25,0,1);ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x-l.len*.22,l.y+l.len);ctx.stroke()}ctx.globalAlpha=1}
function drawPowerBars(){let y=66;if(shieldTime>0){drawBar('蓝盾',shieldTime/8,'#4ea3ff',y);y+=20}if(rubyTime>0){drawBar('无敌',rubyTime/8,'#ff5d72',y);y+=20}if(standTime>0){drawBar('替身',standTime/8,'#b764ff',y);y+=20}if(phase==='boss')drawBar('BOSS',1-bossTimer/8.5,bossType==='knife'?'#ffd25e':'#62ff9f',y)}
function drawBar(label,pct,color,y){const x=16,w=118;ctx.fillStyle='rgba(255,255,255,.14)';roundRect(x,y,w,11,999);ctx.fill();ctx.fillStyle=color;roundRect(x,y,w*clamp(pct,0,1),11,999);ctx.fill();ctx.fillStyle='rgba(255,255,255,.88)';ctx.font='900 11px system-ui';ctx.fillText(label,x+w+8,y+10)}
function draw(){ctx.clearRect(0,0,W,H);const shakeX=shakeTime>0?(Math.random()-.5)*10:0,shakeY=shakeTime>0?(Math.random()-.5)*8:0;ctx.save();ctx.translate(shakeX,shakeY);drawWorld();drawWarnings();drawObjects();drawStand();drawPlayer();drawImpacts();drawParticles();drawTexts();drawSpeedLines();drawPowerBars();ctx.restore();if(flashTime>0){ctx.fillStyle=`rgba(255,255,255,${Math.min(.65,flashTime*3)})`;ctx.fillRect(0,0,W,H)}if(slowMoTime>0){ctx.fillStyle='rgba(255,80,90,.07)';ctx.fillRect(0,0,W,H)}}
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowleft'||k==='a')moveLeft();if(k==='arrowright'||k==='d')moveRight();if(k==='arrowup'||k==='w'||k===' ')jump();if(k==='arrowdown'||k==='s')startHoldCrouch()});window.addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k==='arrowdown'||k==='s')stopHoldCrouch()});let touchStartX=0,touchStartY=0;wrap.addEventListener('pointerdown',e=>{touchStartX=e.clientX;touchStartY=e.clientY});wrap.addEventListener('pointerup',e=>{const dx=e.clientX-touchStartX,dy=e.clientY-touchStartY,ax=Math.abs(dx),ay=Math.abs(dy);if(Math.max(ax,ay)<24)return;if(ax>ay)dx<0?moveLeft():moveRight();else dy<0?jump():tapCrouch()});window.addEventListener('resize',resize);startBtn.addEventListener('click',startGame);resize();draw();
</script>

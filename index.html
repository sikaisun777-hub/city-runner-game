<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星尘跑酷：致敬版</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070c18;
      color: #fff;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 15%, rgba(127, 84, 255, .25), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(255, 217, 86, .15), transparent 25%),
        linear-gradient(160deg, #0a1020, #050813 60%, #02040a);
    }

    .game-wrap {
      position: relative;
      width: min(96vw, 560px);
      height: min(96vh, 880px);
      height: min(96dvh, 880px);
      min-height: 560px;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.18);
      background: #08101f;
      box-shadow: 0 30px 100px rgba(0,0,0,.6);
      touch-action: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      pointer-events: none;
    }

    .badge {
      padding: 7px 4px;
      border-radius: 14px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .badge small {
      display: block;
      color: rgba(255,255,255,.68);
      font-size: 10px;
      margin-bottom: 2px;
    }

    .badge strong {
      font-size: 16px;
      line-height: 1.1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(3, 6, 16, .68);
      backdrop-filter: blur(8px);
    }

    .card {
      width: min(94%, 430px);
      padding: 24px 20px;
      border-radius: 26px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      text-align: center;
    }

    .card h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 9vw, 56px);
      letter-spacing: 2px;
      text-shadow: 0 8px 28px rgba(0,0,0,.38);
    }

    .card p {
      margin: 10px auto 18px;
      color: rgba(255,255,255,.84);
      line-height: 1.65;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: #07101d;
      background: linear-gradient(90deg, #7cfff2, #fff2a9, #ffd35e);
      box-shadow: 0 12px 34px rgba(255, 211, 94, .24);
    }

    .secondary {
      color: white;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: none;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 76px;
      z-index: 9;
      transform: translateX(-50%);
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      backdrop-filter: blur(12px);
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { animation: toastShow 1.1s ease-out forwards; }

    @keyframes toastShow {
      0% { opacity: 0; transform: translate(-50%, -10px); }
      20%, 80% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }

    .boss-banner {
      position: absolute;
      left: 0;
      right: 0;
      top: 42%;
      z-index: 10;
      text-align: center;
      font-size: clamp(34px, 10vw, 66px);
      font-weight: 1000;
      letter-spacing: 4px;
      color: #fff26a;
      text-shadow:
        4px 4px 0 #7a3dff,
        0 0 30px rgba(255, 242, 106, .72);
      pointer-events: none;
      opacity: 0;
      transform: rotate(-6deg) scale(.7);
    }

    .boss-banner.show { animation: bossBanner 1.5s ease-out forwards; }

    @keyframes bossBanner {
      0% { opacity: 0; transform: rotate(-6deg) scale(.55); }
      20%, 75% { opacity: 1; transform: rotate(-6deg) scale(1); }
      100% { opacity: 0; transform: rotate(-6deg) scale(1.18); }
    }

    .dialogue {
      position: absolute;
      right: 10px;
      top: 118px;
      width: min(46%, 230px);
      min-height: 72px;
      z-index: 8;
      padding: 12px 12px 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 16px 40px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
      opacity: 0;
      transform: translateY(-8px);
      transition: .2s ease;
      pointer-events: none;
    }

    .dialogue.show {
      opacity: 1;
      transform: translateY(0);
    }

    .dialogue .speaker {
      font-size: 12px;
      font-weight: 900;
      color: #fff4a8;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .dialogue .line {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,.92);
    }

    .controls {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 6;
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      pointer-events: none;
    }

    .controls div {
      padding: 8px 4px;
      border-radius: 12px;
      text-align: center;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.78);
      font-size: 11px;
      font-weight: 800;
    }

    @media (max-width: 560px) {
      .game-wrap {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
        border-radius: 0;
        border: 0;
      }
      .hud {
        left: 7px;
        right: 7px;
        top: 7px;
        gap: 4px;
      }
      .badge {
        padding: 6px 2px;
        border-radius: 12px;
      }
      .badge strong {
        font-size: 14px;
      }
      .dialogue {
        top: 108px;
        right: 7px;
        width: min(52%, 210px);
        padding: 10px;
      }
      .dialogue .line {
        font-size: 12px;
      }
      .controls {
        display: grid;
      }
      .card {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="game-wrap" id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <section class="hud">
      <div class="badge"><small>分数</small><strong id="scoreEl">0</strong></div>
      <div class="badge"><small>金币</small><strong id="coinEl">0</strong></div>
      <div class="badge"><small>速度</small><strong id="speedEl">1.0x</strong></div>
      <div class="badge"><small>阶段</small><strong id="phaseEl">跑酷</strong></div>
    </section>

    <div class="toast" id="toast">提示</div>
    <div class="boss-banner" id="bossBanner">BOSS!</div>

    <div class="dialogue" id="dialogueBox">
      <div class="speaker" id="dialogueSpeaker">旁白</div>
      <div class="line" id="dialogueLine">准备开始。</div>
    </div>

    <section class="controls" aria-hidden="true">
      <div>← 左</div>
      <div>→ 右</div>
      <div>↑ 跳</div>
      <div>↓ 滑</div>
    </section>

    <section class="overlay" id="overlay">
      <div class="card">
        <h1>星尘跑酷</h1>
        <p>
          像素风 JOJO 致敬版跑酷。<br>
          修复了刀弹幕“无解”问题，并加入绿宝石弹幕 / 飞刀 Boss 战、死亡动画、对话框。
        </p>
        <p>电脑：方向键 / WASD　手机：左右上下滑动</p>
        <div class="btn-row">
          <button id="startBtn">开始游戏</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('gameWrap');

    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    const scoreEl = document.getElementById('scoreEl');
    const coinEl = document.getElementById('coinEl');
    const speedEl = document.getElementById('speedEl');
    const phaseEl = document.getElementById('phaseEl');

    const toast = document.getElementById('toast');
    const bossBanner = document.getElementById('bossBanner');

    const dialogueBox = document.getElementById('dialogueBox');
    const dialogueSpeaker = document.getElementById('dialogueSpeaker');
    const dialogueLine = document.getElementById('dialogueLine');

    let W = 0, H = 0, dpr = 1;
    let running = false;
    let gameOver = false;
    let lastTime = 0;

    let score = 0;
    let coins = 0;
    let speed = 7;
    let distance = 0;

    let spawnTimer = 0;
    let coinTimer = 0;
    let powerTimer = 0;
    let shakeTime = 0;
    let flashTime = 0;
    let magnetTime = 0;
    let shieldTime = 0;

    let phase = 'run'; // run / boss / death
    let bossType = 'emerald'; // emerald / knife
    let bossTime = 0;
    let bossCooldown = 950;
    let bossAttackTimer = 0;
    let bossAttackCount = 0;

    let objects = [];
    let particles = [];
    let speedLines = [];
    let deathAnim = null;

    const lanes = [-1, 0, 1];

    const player = {
      lane: 0,
      laneX: 0,
      y: 0,
      baseY: 0,
      w: 22,
      h: 34,
      vy: 0,
      jumping: false,
      rolling: false,
      rollTime: 0,
      dead: false
    };

    function resize() {
      const r = wrap.getBoundingClientRect();
      dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      W = Math.floor(r.width);
      H = Math.floor(r.height);

      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      player.baseY = H - 118;
      if (!player.jumping && !player.dead) player.y = player.baseY;
      draw();
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function laneToX(lane) {
      return W / 2 + lane * W * 0.255;
    }

    function project(lane, z) {
      const horizonY = H * 0.23;
      const t = Math.max(0, Math.min(1, 1 - z / H));
      const p = t * t;
      const laneGap = W * (0.05 + 0.245 * p);
      return {
        x: W / 2 + lane * laneGap,
        y: horizonY + (H - horizonY) * p,
        scale: 0.24 + p * 1.12,
        p
      };
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.remove('show');
      void toast.offsetWidth;
      toast.classList.add('show');
    }

    let dialogueTimeout = null;
    function showDialogue(speaker, line, duration = 1800) {
      dialogueSpeaker.textContent = speaker;
      dialogueLine.textContent = line;
      dialogueBox.classList.add('show');
      clearTimeout(dialogueTimeout);
      dialogueTimeout = setTimeout(() => {
        dialogueBox.classList.remove('show');
      }, duration);
    }

    function showBossBanner(text) {
      bossBanner.textContent = text;
      bossBanner.classList.remove('show');
      void bossBanner.offsetWidth;
      bossBanner.classList.add('show');
    }

    function updateHud() {
      scoreEl.textContent = Math.floor(score);
      coinEl.textContent = coins;
      speedEl.textContent = (speed / 7).toFixed(1) + 'x';
      if (phase === 'boss') {
        phaseEl.textContent = bossType === 'emerald' ? '绿弹幕' : '飞刀战';
      } else if (phase === 'death') {
        phaseEl.textContent = '倒地中';
      } else {
        phaseEl.textContent = '跑酷';
      }
    }

    function resetGame() {
      running = false;
      gameOver = false;
      score = 0;
      coins = 0;
      speed = 7;
      distance = 0;

      spawnTimer = 250;
      coinTimer = 420;
      powerTimer = 2600;
      shakeTime = 0;
      flashTime = 0;
      magnetTime = 0;
      shieldTime = 0;

      phase = 'run';
      bossType = 'emerald';
      bossTime = 0;
      bossCooldown = 1100;
      bossAttackTimer = 0;
      bossAttackCount = 0;

      objects = [];
      particles = [];
      speedLines = [];
      deathAnim = null;

      player.lane = 0;
      player.laneX = 0;
      player.y = player.baseY;
      player.vy = 0;
      player.jumping = false;
      player.rolling = false;
      player.rollTime = 0;
      player.dead = false;

      updateHud();
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.style.display = 'none';
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function showHome() {
      overlay.innerHTML = `
        <div class="card">
          <h1>星尘跑酷</h1>
          <p>
            像素风 JOJO 致敬版跑酷。<br>
            绿宝石弹幕与飞刀 Boss 战都已加入，且修复了“无解刀阵”。
          </p>
          <p>电脑：方向键 / WASD　手机：左右上下滑动</p>
          <div class="btn-row">
            <button id="startBtn2">开始游戏</button>
          </div>
        </div>
      `;
      overlay.style.display = 'grid';
      document.getElementById('startBtn2').addEventListener('click', startGame);
    }

    function endGame() {
      gameOver = true;
      running = false;
      overlay.innerHTML = `
        <div class="card">
          <h1>游戏结束</h1>
          <p>分数：<strong>${Math.floor(score)}</strong><br>金币：<strong>${coins}</strong></p>
          <div class="btn-row">
            <button id="againBtn">再玩一次</button>
            <button class="secondary" id="homeBtn">回到首页</button>
          </div>
        </div>
      `;
      overlay.style.display = 'grid';
      document.getElementById('againBtn').addEventListener('click', startGame);
      document.getElementById('homeBtn').addEventListener('click', showHome);
    }

    function spawnObstacle() {
      const typeRoll = Math.random();
      let type = 'barrier';
      if (typeRoll > 0.7) type = 'train';
      else if (typeRoll > 0.48) type = 'lowbar';
      else if (typeRoll > 0.24) type = 'cone';

      const lane = pick(lanes);
      objects.push({ type, lane, z: H + 160, hit: false });

      if (Math.random() < 0.24) {
        const lane2 = pick(lanes.filter(l => l !== lane));
        objects.push({
          type: Math.random() < 0.5 ? 'barrier' : 'cone',
          lane: lane2,
          z: H + 250,
          hit: false
        });
      }
    }

    function spawnCoinLine() {
      const lane = pick(lanes);
      const count = 5 + Math.floor(Math.random() * 4);
      for (let i = 0; i < count; i++) {
        objects.push({
          type: 'coin',
          lane,
          z: H + 100 + i * 65,
          hit: false,
          bob: Math.random() * 10
        });
      }
    }

    function spawnPowerup() {
      objects.push({
        type: Math.random() < 0.5 ? 'magnet' : 'shield',
        lane: pick(lanes),
        z: H + 150,
        hit: false
      });
    }

    function startBoss(type) {
      phase = 'boss';
      bossType = type;
      bossTime = 0;
      bossAttackTimer = 70;
      bossAttackCount = 0;
      objects = objects.filter(o => o.type === 'coin' || o.type === 'magnet' || o.type === 'shield');

      if (type === 'emerald') {
        showBossBanner('EMERALD!');
        showToast('Boss：绿宝石弹幕');
        showDialogue('神秘替身使者', '看好了，绿色光雨会封住两条道。', 2200);
      } else {
        showBossBanner('KNIVES!');
        showToast('Boss：飞刀风暴');
        showDialogue('神秘替身使者', '这波飞刀只会留一条生路，别乱动。', 2200);
      }
    }

    function maybeStartBoss() {
      if (phase !== 'run') return;
      bossCooldown -= speed;
      if (score > 500 && bossCooldown <= 0) {
        startBoss(Math.random() < 0.5 ? 'emerald' : 'knife');
        bossCooldown = 1700 + Math.random() * 1000;
      }
    }

    // 绿宝石弹幕：永远至少留一条空道
    function spawnEmeraldSafeWave() {
      const safeLane = pick(lanes);
      const blocked = lanes.filter(l => l !== safeLane);
      blocked.forEach((lane, i) => {
        objects.push({
          type: 'emerald',
          lane,
          z: H + 135 + i * 18,
          hit: false
        });
      });

      showDialogue('冷面跑者', `空着的那条道就是生路。`, 1300);
    }

    // 飞刀波：只用“可躲避模式”
    function spawnKnifeSafeWave() {
      const safeLane = pick(lanes);
      const blocked = lanes.filter(l => l !== safeLane);

      // 三种公平模式，保证永远有解
      const patternType = Math.floor(Math.random() * 3);

      if (patternType === 0) {
        // 同时封两道，留一条空道
        blocked.forEach(lane => {
          objects.push({
            type: 'knife',
            lane,
            z: H + 130,
            low: false,
            hit: false
          });
        });
        showDialogue('神秘替身使者', '两把高刀，剩下一道给你。', 1300);
      } else if (patternType === 1) {
        // 一高一低，但仍留一条空道
        objects.push({
          type: 'knife',
          lane: blocked[0],
          z: H + 130,
          low: false,
          hit: false
        });
        objects.push({
          type: 'knife',
          lane: blocked[1],
          z: H + 170,
          low: true,
          hit: false
        });
        showDialogue('冷面跑者', '先换道，再决定要不要滑铲。', 1500);
      } else {
        // 交错双刀，仍有一条全程空道
        objects.push({
          type: 'knife',
          lane: blocked[0],
          z: H + 110,
          low: false,
          hit: false
        });
        objects.push({
          type: 'knife',
          lane: blocked[1],
          z: H + 260,
          low: false,
          hit: false
        });
        showDialogue('神秘替身使者', '别急，一次只躲一个。', 1300);
      }
    }

    function moveLeft() {
      if (!running || player.dead) return;
      player.lane = Math.max(-1, player.lane - 1);
    }

    function moveRight() {
      if (!running || player.dead) return;
      player.lane = Math.min(1, player.lane + 1);
    }

    function jump() {
      if (!running || player.dead || player.jumping || player.rolling) return;
      player.vy = -16.5;
      player.jumping = true;
    }

    function roll() {
      if (!running || player.dead || player.jumping) return;
      player.rolling = true;
      player.rollTime = 0.55;
    }

    function triggerDeath(kind) {
      if (player.dead) return;

      if (shieldTime > 0) {
        shieldTime = 0;
        shakeTime = 0.25;
        flashTime = 0.14;
        showToast('护盾抵消了这次撞击！');
        showDialogue('冷面跑者', '还没到倒下的时候。', 1200);
        return;
      }

      player.dead = true;
      phase = 'death';

      const x = laneToX(player.laneX);
      const y = player.y;

      if (kind === 'train') {
        deathAnim = {
          kind: 'train',
          t: 0,
          x, y,
          vx: rand(-5, 5),
          vy: -18,
          rot: 0,
          spin: rand(-18, 18)
        };
        shakeTime = 0.8;
        flashTime = 0.18;
        showToast('被火车创飞了！');
        showDialogue('旁白', '列车正面撞上，整个人被掀飞出去！', 1800);
      } else {
        deathAnim = {
          kind: 'trip',
          t: 0,
          x, y,
          vx: rand(-2, 2),
          vy: -7,
          rot: 0,
          spin: rand(-8, 8)
        };
        shakeTime = 0.42;
        flashTime = 0.08;
        showToast('被绊倒了！');
        showDialogue('旁白', '脚下失衡，整个人向前扑倒翻滚。', 1800);
      }
    }

    function checkCollision(obj) {
      const p = project(obj.lane, obj.z);
      const laneClose = Math.abs(obj.lane - player.laneX) < 0.42;
      const zClose = Math.abs(p.y - player.y) < 60;

      if (!laneClose || !zClose) return false;

      if (obj.type === 'coin' || obj.type === 'magnet' || obj.type === 'shield') return true;
      if (obj.type === 'lowbar') return !player.rolling;
      if (obj.type === 'barrier' || obj.type === 'cone') return !player.jumping;
      if (obj.type === 'knife') {
        // low=true 可通过滑铲更轻松躲， 但因为永远留安全道，所以不出现无解
        return obj.low ? !player.rolling : true;
      }
      if (obj.type === 'emerald') return true;
      if (obj.type === 'train') return true;
      return false;
    }

    function handleCollision(obj) {
      const p = project(obj.lane, obj.z);

      if (obj.type === 'coin') {
        obj.hit = true;
        coins += 1;
        score += 25;
        burst(p.x, p.y, '#ffd95e');
        return;
      }

      if (obj.type === 'magnet') {
        obj.hit = true;
        magnetTime = 8;
        showToast('磁铁启动！');
        showDialogue('冷面跑者', '把周围金币都吸过来。', 1300);
        burst(p.x, p.y, '#7cfff2');
        return;
      }

      if (obj.type === 'shield') {
        obj.hit = true;
        shieldTime = 8;
        showToast('护盾启动！');
        showDialogue('冷面跑者', '有这一层护盾，先稳住。', 1300);
        burst(p.x, p.y, '#a6ff7c');
        return;
      }

      obj.hit = true;
      triggerDeath(obj.type === 'train' ? 'train' : 'trip');
    }

    function burst(x, y, color) {
      for (let i = 0; i < 16; i++) {
        particles.push({
          x, y,
          vx: Math.cos(i / 16 * Math.PI * 2) * rand(2, 5),
          vy: Math.sin(i / 16 * Math.PI * 2) * rand(2, 5),
          life: rand(0.35, 0.7),
          color
        });
      }
    }

    function update(dt) {
      const dt60 = dt * 60;
      shakeTime = Math.max(0, shakeTime - dt);
      flashTime = Math.max(0, flashTime - dt);

      if (player.dead && deathAnim) {
        deathAnim.t += dt;
        deathAnim.x += deathAnim.vx * dt60;
        deathAnim.y += deathAnim.vy * dt60;
        deathAnim.vy += 0.9 * dt60;
        deathAnim.rot += deathAnim.spin * dt60;

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt60;
          p.y += p.vy * dt60;
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }

        if (deathAnim.t > 1.2) endGame();
        return;
      }

      speed = Math.min(18, speed + dt * 0.13);
      distance += speed * dt60;
      score += speed * dt * 6.2;

      magnetTime = Math.max(0, magnetTime - dt);
      shieldTime = Math.max(0, shieldTime - dt);

      player.laneX += (player.lane - player.laneX) * Math.min(1, dt * 13);

      if (player.jumping) {
        player.y += player.vy * dt60;
        player.vy += 0.72 * dt60;
        if (player.y >= player.baseY) {
          player.y = player.baseY;
          player.vy = 0;
          player.jumping = false;
        }
      }

      if (player.rolling) {
        player.rollTime -= dt;
        if (player.rollTime <= 0) player.rolling = false;
      }

      if (phase === 'run') {
        maybeStartBoss();

        spawnTimer -= dt60 * speed;
        coinTimer -= dt60 * speed;
        powerTimer -= dt60 * speed;

        if (spawnTimer <= 0) {
          spawnObstacle();
          spawnTimer = 650 + Math.random() * 520 - speed * 22;
        }

        if (coinTimer <= 0) {
          spawnCoinLine();
          coinTimer = 700 + Math.random() * 760;
        }

        if (powerTimer <= 0) {
          spawnPowerup();
          powerTimer = 3400 + Math.random() * 3200;
        }
      }
      else if (phase === 'boss') {
        bossTime += dt;
        bossAttackTimer -= dt60 * speed;

        // Boss 攻击只出安全模式
        if (bossAttackTimer <= 0) {
          if (bossType === 'emerald') {
            spawnEmeraldSafeWave();
            bossAttackTimer = 420 + Math.random() * 180;
          } else {
            spawnKnifeSafeWave();
            bossAttackTimer = 440 + Math.random() * 200;
          }
          bossAttackCount++;
        }

        // Boss 战里也给一点金币
        coinTimer -= dt60 * speed;
        if (coinTimer <= 0) {
          spawnCoinLine();
          coinTimer = 1000;
        }

        if (bossTime > 16) {
          phase = 'run';
          showToast('Boss 退场！');
          showDialogue('冷面跑者', '结束了，继续往前跑。', 1400);
        }
      }

      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        const objSpeed = (obj.type === 'emerald' || obj.type === 'knife') ? speed * 1.12 : speed;
        obj.z -= objSpeed * dt60;

        // 磁铁吸币
        if (obj.type === 'coin' && magnetTime > 0) {
          const p = project(obj.lane, obj.z);
          const px = laneToX(player.laneX);
          if (Math.abs(p.y - player.y) < 260 && Math.abs(p.x - px) < W * 0.38) {
            obj.lane += (player.laneX - obj.lane) * 0.16;
            obj.z += (player.y - p.y) * 0.12;
          }
        }

        if (!obj.hit && checkCollision(obj)) {
          handleCollision(obj);
        }

        if (obj.z < -180 || obj.hit) {
          objects.splice(i, 1);
        }
      }

      if (Math.random() < 0.3) {
        speedLines.push({
          x: rand(0, W),
          y: rand(0, H * 0.5),
          len: rand(40, 100),
          life: 0.28
        });
      }

      for (let i = speedLines.length - 1; i >= 0; i--) {
        speedLines[i].life -= dt;
        speedLines[i].y += speed * dt60;
        if (speedLines[i].life <= 0) speedLines.splice(i, 1);
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt60;
        p.y += p.vy * dt60;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }

      updateHud();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      const sx = shakeTime > 0 ? (Math.random() - 0.5) * 10 : 0;
      const sy = shakeTime > 0 ? (Math.random() - 0.5) * 8 : 0;

      ctx.save();
      ctx.translate(sx, sy);
      drawWorld();
      drawBoss();
      drawObjects();
      drawPlayer();
      drawParticles();
      drawSpeedLines();
      drawPowerBars();
      ctx.restore();

      if (flashTime > 0) {
        ctx.fillStyle = `rgba(255,255,255,${Math.min(0.7, flashTime * 3)})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawWorld() {
      const horizon = H * 0.23;

      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#1b2454');
      sky.addColorStop(0.45, '#102140');
      sky.addColorStop(1, '#050812');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      drawMoonStars();
      drawBuildings(horizon);

      ctx.beginPath();
      ctx.moveTo(W * 0.39, horizon);
      ctx.lineTo(W * 0.61, horizon);
      ctx.lineTo(W * 1.04, H + 60);
      ctx.lineTo(-W * 0.04, H + 60);
      ctx.closePath();

      const road = ctx.createLinearGradient(0, horizon, 0, H);
      road.addColorStop(0, '#172138');
      road.addColorStop(1, '#2b3650');
      ctx.fillStyle = road;
      ctx.fill();

      drawRails();
      drawLaneLines();
      drawTunnelLights();
    }

    function drawMoonStars() {
      ctx.fillStyle = 'rgba(255,232,123,.85)';
      ctx.beginPath();
      ctx.arc(W * 0.82, H * 0.09, W * 0.045, 0, Math.PI * 2);
      ctx.fill();

      for (let i = 0; i < 30; i++) {
        const x = (i * 97 + distance * 0.04) % (W + 80) - 40;
        const y = 25 + (i * 41 % Math.floor(H * 0.2));
        ctx.fillStyle = `rgba(255,255,255,${0.2 + (i % 4) * 0.1})`;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    function drawBuildings(horizon) {
      for (let side of [-1, 1]) {
        for (let i = 0; i < 8; i++) {
          const bw = W * 0.11 + (i % 3) * 8;
          const bh = 70 + (i * 33) % 110;
          const x = side < 0 ? i * bw * 0.68 - 25 : W - i * bw * 0.68 - bw + 25;
          const y = horizon - bh + 22;
          ctx.fillStyle = i % 2 ? '#0c1630' : '#112247';
          ctx.fillRect(x, y, bw, bh);

          ctx.fillStyle = 'rgba(255,215,109,.22)';
          for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 2; c++) {
              ctx.fillRect(x + 12 + c * 26, y + 14 + r * 20, 7, 8);
            }
          }
        }
      }
    }

    function drawRails() {
      for (let lane of [-1, 0, 1]) {
        for (let rail of [-0.18, 0.18]) {
          const a = project(lane + rail, H);
          const b = project(lane + rail, -40);
          ctx.strokeStyle = 'rgba(160,200,240,.36)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }

      for (let z = H + 100 - (distance % 80); z > -100; z -= 80) {
        const p = project(0, z);
        ctx.strokeStyle = 'rgba(255,255,255,.16)';
        ctx.lineWidth = 2 + p.scale;
        ctx.beginPath();
        ctx.moveTo(W / 2 - W * 0.42 * p.p, p.y);
        ctx.lineTo(W / 2 + W * 0.42 * p.p, p.y);
        ctx.stroke();
      }
    }

    function drawLaneLines() {
      ctx.setLineDash([12, 18]);
      ctx.lineDashOffset = -distance * 0.7;

      for (let lane of [-0.5, 0.5]) {
        const a = project(lane, H);
        const b = project(lane, -40);
        ctx.strokeStyle = 'rgba(255,255,255,.25)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      ctx.setLineDash([]);
    }

    function drawTunnelLights() {
      for (let z = H + 90 - (distance % 120); z > -80; z -= 120) {
        const p = project(0, z);
        ctx.fillStyle = `rgba(255,214,94,${0.12 + p.p * 0.35})`;
        ctx.beginPath();
        ctx.ellipse(W * 0.12, p.y, 18 * p.scale, 6 * p.scale, 0, 0, Math.PI * 2);
        ctx.ellipse(W * 0.88, p.y, 18 * p.scale, 6 * p.scale, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBoss() {
      if (phase !== 'boss') return;

      const x = W / 2;
      const y = H * 0.16 + Math.sin(bossTime * 4) * 8;

      ctx.save();
      ctx.translate(x, y);
      ctx.globalAlpha = 0.95;

      ctx.fillStyle = bossType === 'emerald' ? 'rgba(70,255,150,.18)' : 'rgba(255,216,95,.18)';
      ctx.beginPath();
      ctx.arc(0, 0, 76, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = bossType === 'emerald' ? '#62ff9f' : '#ffd25e';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, 60 + Math.sin(bossTime * 7) * 5, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#161022';
      roundRect(ctx, -38, -52, 76, 104, 24);
      ctx.fill();

      ctx.fillStyle = bossType === 'emerald' ? '#62ff9f' : '#ffd25e';
      ctx.font = '900 28px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(bossType === 'emerald' ? '绿' : '刀', 0, 0);

      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.font = '900 12px system-ui';
      ctx.fillText('BOSS', 0, 42);
      ctx.restore();
    }

    function drawObjects() {
      const sorted = [...objects].sort((a, b) => b.z - a.z);

      for (const obj of sorted) {
        const p = project(obj.lane, obj.z);
        if (p.y < H * 0.18 || p.y > H + 120) continue;

        if (obj.type === 'coin') drawCoin(p, obj);
        else if (obj.type === 'magnet') drawPower(p, '磁', '#7cfff2');
        else if (obj.type === 'shield') drawPower(p, '盾', '#a6ff7c');
        else if (obj.type === 'train') drawTrain(p);
        else if (obj.type === 'lowbar') drawLowbar(p);
        else if (obj.type === 'emerald') drawEmerald(p);
        else if (obj.type === 'knife') drawKnife(p, obj.low);
        else drawBarrier(p, obj.type === 'cone');
      }
    }

    function drawCoin(p, obj) {
      const r = 13 * p.scale;
      const bob = Math.sin((distance + obj.bob) * 0.08) * 5 * p.scale;

      ctx.save();
      ctx.translate(p.x, p.y + bob);
      ctx.fillStyle = '#ffd95e';
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.7, r, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.7)';
      ctx.lineWidth = 2 * p.scale;
      ctx.stroke();
      ctx.fillStyle = 'rgba(80,50,0,.28)';
      ctx.fillRect(-r * 0.12, -r * 0.55, r * 0.24, r * 1.1);
      ctx.restore();
    }

    function drawPower(p, label, color) {
      const s = 38 * p.scale;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.shadowColor = color;
      ctx.shadowBlur = 18 * p.scale;
      ctx.fillStyle = color;
      roundRect(ctx, -s / 2, -s / 2, s, s, 12 * p.scale);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#07101d';
      ctx.font = `900 ${17 * p.scale}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 0, 1);
      ctx.restore();
    }

    function drawBarrier(p, cone = false) {
      const w = 58 * p.scale;
      const h = 42 * p.scale;
      ctx.save();
      ctx.translate(p.x, p.y);

      if (cone) {
        ctx.fillStyle = '#ff8f2c';
        ctx.beginPath();
        ctx.moveTo(0, -h * 0.75);
        ctx.lineTo(w * 0.45, h * 0.45);
        ctx.lineTo(-w * 0.45, h * 0.45);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.75)';
        ctx.fillRect(-w * 0.28, h * 0.02, w * 0.56, h * 0.12);
      } else {
        ctx.fillStyle = '#ffb13b';
        ctx.fillRect(-w / 2, -h / 2, w, h);
        ctx.fillStyle = 'rgba(80,38,0,.35)';
        ctx.fillRect(-w / 2, -h * 0.08, w, h * 0.16);
        ctx.fillStyle = 'rgba(255,255,255,.55)';
        ctx.fillRect(-w * 0.35, -h * 0.34, w * 0.7, h * 0.16);
      }

      ctx.restore();
    }

    function drawLowbar(p) {
      const w = 86 * p.scale;
      const h = 70 * p.scale;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.strokeStyle = '#ffcc66';
      ctx.lineWidth = 7 * p.scale;
      ctx.beginPath();
      ctx.moveTo(-w / 2, h / 2);
      ctx.lineTo(-w / 2, -h / 2);
      ctx.lineTo(w / 2, -h / 2);
      ctx.lineTo(w / 2, h / 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.75)';
      ctx.fillRect(-w * 0.32, -h * 0.58, w * 0.64, h * 0.15);
      ctx.restore();
    }

    function drawTrain(p) {
      const w = 88 * p.scale;
      const h = 136 * p.scale;
      ctx.save();
      ctx.translate(p.x, p.y - h * 0.18);

      ctx.fillStyle = '#8d2036';
      roundRect(ctx, -w / 2, -h / 2, w, h, 12 * p.scale);
      ctx.fill();

      ctx.fillStyle = '#ea5064';
      roundRect(ctx, -w * 0.43, -h * 0.43, w * 0.86, h * 0.86, 10 * p.scale);
      ctx.fill();

      ctx.fillStyle = 'rgba(160,240,255,.76)';
      ctx.fillRect(-w * 0.3, -h * 0.3, w * 0.6, h * 0.22);

      ctx.fillStyle = '#ffd25e';
      ctx.beginPath();
      ctx.arc(-w * 0.25, h * 0.32, 6 * p.scale, 0, Math.PI * 2);
      ctx.arc(w * 0.25, h * 0.32, 6 * p.scale, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawEmerald(p) {
      const r = 22 * p.scale;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(distance * 0.025);
      ctx.shadowColor = '#62ff9f';
      ctx.shadowBlur = 18 * p.scale;
      ctx.fillStyle = '#62ff9f';
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.9, -r * 0.2);
      ctx.lineTo(r * 0.55, r);
      ctx.lineTo(-r * 0.55, r);
      ctx.lineTo(-r * 0.9, -r * 0.2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2 * p.scale;
      ctx.stroke();
      ctx.restore();
    }

    function drawKnife(p, low) {
      const s = 44 * p.scale;
      ctx.save();
      ctx.translate(p.x, p.y + (low ? 16 * p.scale : 0));
      ctx.rotate(-0.45);
      ctx.fillStyle = '#dfe8ff';
      ctx.beginPath();
      ctx.moveTo(-s * 0.55, -s * 0.12);
      ctx.lineTo(s * 0.35, -s * 0.12);
      ctx.lineTo(s * 0.65, 0);
      ctx.lineTo(s * 0.35, s * 0.12);
      ctx.lineTo(-s * 0.55, s * 0.12);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#43255f';
      ctx.fillRect(-s * 0.78, -s * 0.17, s * 0.25, s * 0.34);
      ctx.restore();
    }

    // 像素风承太郎致敬版人物
    function drawPlayer() {
      if (player.dead && deathAnim) {
        drawDeathPlayer();
        return;
      }

      const x = laneToX(player.laneX);
      const y = player.y;
      const rollScale = player.rolling ? 0.7 : 1;

      ctx.save();
      ctx.translate(x, y);

      if (shieldTime > 0) {
        ctx.strokeStyle = 'rgba(166,255,124,.8)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, -26, 34, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (magnetTime > 0) {
        ctx.strokeStyle = 'rgba(124,255,242,.45)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.arc(0, -26, 46, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.scale(1, rollScale);
      drawPixelJotaroLike(0, 0);
      ctx.restore();
    }

    function drawDeathPlayer() {
      const d = deathAnim;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot * Math.PI / 180);
      ctx.globalAlpha = Math.max(0.25, 1 - d.t * 0.35);
      drawPixelJotaroLike(0, 0);
      ctx.restore();
    }

    function px(x, y, size, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, size, size);
    }

    function drawPixelJotaroLike(cx, cy) {
      const s = 4.2;
      const ox = cx - 22;
      const oy = cy - 80;

      // 帽子 / 头发
      px(ox + 16*s/4.2, oy + 0, s, '#1d1930');
      px(ox + 20*s/4.2, oy + 0, s, '#1d1930');
      px(ox + 24*s/4.2, oy + 0, s, '#1d1930');
      px(ox + 12*s/4.2, oy + s, s, '#1d1930');
      px(ox + 16*s/4.2, oy + s, s, '#1d1930');
      px(ox + 20*s/4.2, oy + s, s, '#29204a');
      px(ox + 24*s/4.2, oy + s, s, '#29204a');
      px(ox + 28*s/4.2, oy + s, s, '#1d1930');

      // 脸
      px(ox + 16*s/4.2, oy + 2*s, s, '#efc18e');
      px(ox + 20*s/4.2, oy + 2*s, s, '#efc18e');
      px(ox + 24*s/4.2, oy + 2*s, s, '#efc18e');
      px(ox + 16*s/4.2, oy + 3*s, s, '#e6b785');
      px(ox + 20*s/4.2, oy + 3*s, s, '#efc18e');
      px(ox + 24*s/4.2, oy + 3*s, s, '#e6b785');

      // 帽檐
      px(ox + 12*s/4.2, oy + 2*s, s, '#111');
      px(ox + 28*s/4.2, oy + 2*s, s, '#111');

      // 身体：紫色长风衣
      const coat = '#5536a6';
      const coat2 = '#6f4dd2';
      for (let i = 0; i < 6; i++) {
        px(ox + 14*s/4.2, oy + (4+i)*s, s, coat);
        px(ox + 18*s/4.2, oy + (4+i)*s, s, coat2);
        px(ox + 22*s/4.2, oy + (4+i)*s, s, coat2);
        px(ox + 26*s/4.2, oy + (4+i)*s, s, coat);
      }

      // 肩膀
      px(ox + 10*s/4.2, oy + 5*s, s, coat);
      px(ox + 30*s/4.2, oy + 5*s, s, coat);

      // 手臂
      px(ox + 10*s/4.2, oy + 6*s, s, '#efc18e');
      px(ox + 30*s/4.2, oy + 6*s, s, '#efc18e');

      // 腿
      px(ox + 16*s/4.2, oy + 10*s, s, '#242a42');
      px(ox + 24*s/4.2, oy + 10*s, s, '#242a42');
      px(ox + 16*s/4.2, oy + 11*s, s, '#242a42');
      px(ox + 24*s/4.2, oy + 11*s, s, '#242a42');

      // 鞋
      px(ox + 14*s/4.2, oy + 12*s, s, '#c8d8ff');
      px(ox + 26*s/4.2, oy + 12*s, s, '#c8d8ff');

      // 金链条致敬
      px(ox + 30*s/4.2, oy + 4*s, s, '#ffd95e');
      px(ox + 32*s/4.2, oy + 5*s, s, '#ffd95e');
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / 0.7);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawSpeedLines() {
      ctx.strokeStyle = 'rgba(255,255,255,.16)';
      ctx.lineWidth = 2;
      for (const l of speedLines) {
        ctx.globalAlpha = Math.max(0, l.life / 0.28);
        ctx.beginPath();
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x - l.len * 0.25, l.y + l.len);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawPowerBars() {
      let y = 64;
      if (magnetTime > 0) {
        drawBar('磁铁', magnetTime / 8, '#7cfff2', y);
        y += 20;
      }
      if (shieldTime > 0) {
        drawBar('护盾', shieldTime / 8, '#a6ff7c', y);
        y += 20;
      }
      if (phase === 'boss') {
        drawBar('BOSS', 1 - bossTime / 16, bossType === 'emerald' ? '#62ff9f' : '#ffd25e', y);
      }
    }

    function drawBar(label, pct, color, y) {
      const x = 16;
      const w = 112;
      ctx.fillStyle = 'rgba(255,255,255,.15)';
      roundRect(ctx, x, y, w, 11, 999);
      ctx.fill();

      ctx.fillStyle = color;
      roundRect(ctx, x, y, w * Math.max(0, Math.min(1, pct)), 11, 999);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,.86)';
      ctx.font = '900 11px system-ui';
      ctx.fillText(label, x + w + 8, y + 10);
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function loop(now) {
      if (!running) return;
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    // 键盘
    window.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if (key === 'arrowleft' || key === 'a') moveLeft();
      if (key === 'arrowright' || key === 'd') moveRight();
      if (key === 'arrowup' || key === 'w' || key === ' ') jump();
      if (key === 'arrowdown' || key === 's') roll();
    });

    // 手机滑动
    let startX = 0;
    let startY = 0;

    wrap.addEventListener('pointerdown', e => {
      startX = e.clientX;
      startY = e.clientY;
    });

    wrap.addEventListener('pointerup', e => {
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (Math.max(absX, absY) < 24) return;

      if (absX > absY) {
        dx < 0 ? moveLeft() : moveRight();
      } else {
        dy < 0 ? jump() : roll();
      }
    });

    window.addEventListener('resize', () => {
      resize();
      draw();
    });

    startBtn.addEventListener('click', startGame);

    resize();
    draw();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星尘跑酷：替身 v14</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      background:
        radial-gradient(circle at 18% 12%, rgba(118, 77, 255, .30), transparent 28%),
        radial-gradient(circle at 84% 8%, rgba(255, 217, 92, .18), transparent 25%),
        linear-gradient(160deg, #070916, #08111f 56%, #02040a);
      user-select: none;
    }

    .game-wrap {
      position: relative;
      width: min(96vw, 560px);
      height: min(96vh, 880px);
      height: min(96dvh, 880px);
      min-height: 560px;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.18);
      background: #08101f;
      box-shadow: 0 30px 100px rgba(0,0,0,.62);
      touch-action: none;
    }

    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .hud {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 8px;
      z-index: 8;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      pointer-events: none;
    }

    .badge {
      padding: 6px 2px;
      border-radius: 12px;
      text-align: center;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.17);
      backdrop-filter: blur(10px);
    }

    .badge small { display: block; color: rgba(255,255,255,.68); font-size: 9px; margin-bottom: 2px; }
    .badge strong { font-size: 12px; line-height: 1.1; }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(2,4,14,.68);
      backdrop-filter: blur(8px);
    }

    .card {
      width: min(94%, 470px);
      padding: 24px 20px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }

    h1 { margin: 0 0 8px; font-size: clamp(34px, 9vw, 58px); letter-spacing: 2px; text-shadow: 0 8px 28px rgba(0,0,0,.42); }
    .card p { margin: 10px auto 18px; color: rgba(255,255,255,.84); line-height: 1.65; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: #07101d;
      background: linear-gradient(90deg, #7cfff2, #fff2a9, #ffd35e);
      box-shadow: 0 12px 34px rgba(255,211,94,.24);
    }

    .secondary { color: white; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.24); box-shadow: none; }
    .danger { background: linear-gradient(90deg, #ff5d74, #ffd35e); color: #1a0710; }

    .toast {
      position: absolute;
      left: 50%;
      top: 76px;
      z-index: 12;
      transform: translateX(-50%);
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      backdrop-filter: blur(12px);
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { animation: toastShow 1.1s ease-out forwards; }
    @keyframes toastShow { 0% { opacity: 0; transform: translate(-50%, -10px); } 20%, 80% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -10px); } }

    .boss-banner {
      position: absolute;
      left: 0;
      right: 0;
      top: 41%;
      z-index: 13;
      text-align: center;
      font-size: clamp(34px, 10vw, 66px);
      font-weight: 1000;
      letter-spacing: 4px;
      color: #fff26a;
      text-shadow: 4px 4px 0 #7a3dff, 0 0 30px rgba(255,242,106,.75);
      pointer-events: none;
      opacity: 0;
      transform: rotate(-6deg) scale(.7);
    }

    .boss-banner.show { animation: bossBanner 1.5s ease-out forwards; }
    @keyframes bossBanner { 0% { opacity: 0; transform: rotate(-6deg) scale(.55); } 20%, 75% { opacity: 1; transform: rotate(-6deg) scale(1); } 100% { opacity: 0; transform: rotate(-6deg) scale(1.18); } }

    .dialogue {
      position: absolute;
      right: 8px;
      top: 112px;
      width: min(62%, 250px);
      min-height: 76px;
      z-index: 11;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 16px 40px rgba(0,0,0,.24);
      backdrop-filter: blur(10px);
      opacity: 0;
      transform: translateY(-8px);
      transition: .2s ease;
      pointer-events: none;
    }

    .dialogue.show { opacity: 1; transform: translateY(0); }
    .dialogue .speaker { font-size: 12px; font-weight: 900; color: #fff4a8; margin-bottom: 5px; letter-spacing: 1px; }
    .dialogue .line { font-size: 12px; line-height: 1.45; color: rgba(255,255,255,.92); }

    .controls {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 9;
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      pointer-events: none;
    }

    .controls div { padding: 8px 4px; border-radius: 12px; text-align: center; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.16); color: rgba(255,255,255,.78); font-size: 11px; font-weight: 800; }

    @media (max-width: 560px) {
      .game-wrap { width: 100vw; height: 100vh; height: 100dvh; min-height: 0; border-radius: 0; border: 0; }
      .controls { display: grid; }
      .card { padding: 22px 18px; }
    }
  </style>
</head>
<body>
  <main class="game-wrap" id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <section class="hud">
      <div class="badge"><small>分数</small><strong id="scoreEl">0</strong></div>
      <div class="badge"><small>金币</small><strong id="coinEl">0</strong></div>
      <div class="badge"><small>速度</small><strong id="speedEl">1.0x</strong></div>
      <div class="badge"><small>阶段</small><strong id="phaseEl">跑酷</strong></div>
      <div class="badge"><small>复活</small><strong id="reviveEl">1</strong></div>
      <div class="badge"><small>替身</small><strong id="standEl">无</strong></div>
    </section>

    <div class="toast" id="toast">提示</div>
    <div class="boss-banner" id="bossBanner">BOSS!</div>
    <div class="dialogue" id="dialogueBox"><div class="speaker" id="dialogueSpeaker">旁白</div><div class="line" id="dialogueLine">准备开始。</div></div>

    <section class="controls" aria-hidden="true"><div>← 左</div><div>→ 右</div><div>↑ 跳</div><div>↓ 按住蹲</div></section>

    <section class="overlay" id="overlay">
      <div class="card">
        <h1>星尘跑酷</h1>
        <p>v14：修复蓝色护盾，加入替身出拳、欧拉欧拉、复活起身动画、红宝石慢镜头。</p>
        <p>电脑：方向键 / WASD。按住 ↓ 或 S 才持续蹲下。<br>手机：左右上下滑动。</p>
        <div class="btn-row"><button id="startBtn">开始游戏</button></div>
      </div>
    </section>
  </main>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('gameWrap');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('scoreEl');
const coinEl = document.getElementById('coinEl');
const speedEl = document.getElementById('speedEl');
const phaseEl = document.getElementById('phaseEl');
const reviveEl = document.getElementById('reviveEl');
const standEl = document.getElementById('standEl');
const toast = document.getElementById('toast');
const bossBanner = document.getElementById('bossBanner');
const dialogueBox = document.getElementById('dialogueBox');
const dialogueSpeaker = document.getElementById('dialogueSpeaker');
const dialogueLine = document.getElementById('dialogueLine');

let W = 0, H = 0, dpr = 1;
let running = false, gameOver = false;
let lastTime = 0;
let score = 0, coins = 0, speed = 7, distance = 0;
let spawnTimer = 0, coinTimer = 0, powerTimer = 0;
let shakeTime = 0, flashTime = 0, slowMoTime = 0, reviveRiseTime = 0;
let magnetTime = 0, shieldTime = 0, giantTime = 0, standTime = 0;
let phase = 'run', bossType = 'emerald', bossTime = 0, bossCooldown = 2600, bossAttackTimer = 0;
let objects = [], particles = [], speedLines = [], warnings = [], texts = [];
let deathAnim = null;
let keyboardCrouchHeld = false;
let revives = 1;
let dialogueTimeout = null;
let oraCombo = 0;
let standPunchTime = 0;

const lanes = [-1, 0, 1];
const player = { lane:0, laneX:0, y:0, baseY:0, vy:0, jumping:false, rolling:false, rollTime:0, dead:false };

function rand(a,b){ return Math.random() * (b-a) + a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function laneToX(lane){ return W/2 + lane * W * .255; }

function resize(){ const r = wrap.getBoundingClientRect(); dpr = Math.max(1, Math.min(devicePixelRatio || 1, 2)); W = Math.floor(r.width); H = Math.floor(r.height); canvas.width = Math.floor(W*dpr); canvas.height = Math.floor(H*dpr); canvas.style.width = W+'px'; canvas.style.height = H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); player.baseY = H - 118; if(!player.jumping && !player.dead) player.y = player.baseY; draw(); }
function project(lane,z){ const horizon=H*.23; const t=Math.max(0,Math.min(1,1-z/H)); const p=t*t; const gap=W*(.05+.245*p); return {x:W/2+lane*gap, y:horizon+(H-horizon)*p, scale:.24+p*1.12, p}; }
function showToast(text){ toast.textContent=text; toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show'); }
function showDialogue(speaker,line,duration=1800){ dialogueSpeaker.textContent=speaker; dialogueLine.textContent=line; dialogueBox.classList.add('show'); clearTimeout(dialogueTimeout); dialogueTimeout=setTimeout(()=>dialogueBox.classList.remove('show'),duration); }
function showBossBanner(text){ bossBanner.textContent=text; bossBanner.classList.remove('show'); void bossBanner.offsetWidth; bossBanner.classList.add('show'); }
function addText(x,y,text,color='#fff26a',size=30){ texts.push({x,y,text,color,size,life:.7,vy:-2}); }
function updateHud(){ scoreEl.textContent=Math.floor(score); coinEl.textContent=coins; speedEl.textContent=(speed/7).toFixed(1)+'x'; phaseEl.textContent=phase==='boss'?(bossType==='emerald'?'绿弹幕':'飞刀战'):(phase==='death'?'倒地中':'跑酷'); reviveEl.textContent=revives; standEl.textContent=standTime>0?'发动中':'无'; }

function resetGame(){ running=false; gameOver=false; score=0; coins=0; speed=7; distance=0; spawnTimer=280; coinTimer=430; powerTimer=1800; shakeTime=0; flashTime=0; slowMoTime=0; reviveRiseTime=0; magnetTime=0; shieldTime=0; giantTime=0; standTime=0; phase='run'; bossType='emerald'; bossTime=0; bossCooldown=2600; bossAttackTimer=0; objects=[]; particles=[]; speedLines=[]; warnings=[]; texts=[]; deathAnim=null; keyboardCrouchHeld=false; revives=1; oraCombo=0; standPunchTime=0; player.lane=0; player.laneX=0; player.y=player.baseY; player.vy=0; player.jumping=false; player.rolling=false; player.rollTime=0; player.dead=false; updateHud(); }
function startGame(){ resetGame(); running=true; overlay.style.display='none'; lastTime=performance.now(); requestAnimationFrame(loop); }
function showHome(){ overlay.innerHTML=`<div class="card"><h1>星尘跑酷</h1><p>v14：护盾生效、替身出拳、欧拉欧拉、复活起身、红宝石慢镜头。</p><p>电脑：方向键 / WASD。手机：滑动。</p><div class="btn-row"><button id="startBtn2">开始游戏</button></div></div>`; overlay.style.display='grid'; document.getElementById('startBtn2').addEventListener('click',startGame); }
function showGameOver(){ gameOver=true; running=false; overlay.innerHTML=`<div class="card"><h1>游戏结束</h1><p>分数：<strong>${Math.floor(score)}</strong><br>金币：<strong>${coins}</strong></p><div class="btn-row">${revives>0?`<button class="danger" id="reviveBtn">复活一次</button>`:''}<button id="againBtn">再玩一次</button><button class="secondary" id="homeBtn">回到首页</button></div></div>`; overlay.style.display='grid'; const reviveBtn=document.getElementById('reviveBtn'); if(reviveBtn) reviveBtn.addEventListener('click',reviveGame); document.getElementById('againBtn').addEventListener('click',startGame); document.getElementById('homeBtn').addEventListener('click',showHome); }
function reviveGame(){ if(revives<=0)return; revives--; player.dead=false; player.lane=0; player.laneX=0; player.y=player.baseY; player.vy=0; player.jumping=false; player.rolling=false; player.rollTime=0; keyboardCrouchHeld=false; phase='run'; bossTime=0; bossAttackTimer=0; deathAnim=null; objects=objects.filter(o=>['coin','magnet','shield','ruby'].includes(o.type)); warnings=[]; shieldTime=Math.max(shieldTime,4); giantTime=Math.max(giantTime,2.5); reviveRiseTime=1.1; shakeTime=0; flashTime=.22; overlay.style.display='none'; showToast('复活成功！'); showDialogue('冷面跑者','やれやれだぜ……重新站起来。',1800); running=true; gameOver=false; lastTime=performance.now(); updateHud(); requestAnimationFrame(loop); }

function spawnObstacle(){ const r=Math.random(); let type=r>.74?'train':r>.52?'lowbar':r>.26?'cone':'barrier'; const lane=pick(lanes); objects.push({type,lane,z:H+160,hit:false}); if(Math.random()<.20){ const lane2=pick(lanes.filter(l=>l!==lane)); objects.push({type:Math.random()<.55?'barrier':'cone',lane:lane2,z:H+255,hit:false}); } }
function spawnCoinLine(){ const lane=pick(lanes); const count=5+Math.floor(Math.random()*4); for(let i=0;i<count;i++) objects.push({type:'coin',lane,z:H+100+i*65,hit:false,bob:Math.random()*10}); }
function spawnPowerup(){ const r=Math.random(); const type=r<.375?'magnet':(r<.75?'shield':'ruby'); objects.push({type,lane:pick(lanes),z:H+150,hit:false}); }
function startBoss(type){ phase='boss'; bossType=type; bossTime=0; bossAttackTimer=120; objects=objects.filter(o=>['coin','magnet','shield','ruby'].includes(o.type)); warnings=[]; if(type==='emerald'){showBossBanner('EMERALD!'); showToast('Boss：绿宝石弹幕'); showDialogue('绿宝石替身','半径二十米的绿色风暴！',2200);} else {showBossBanner('KNIVES!'); showToast('Boss：飞刀风暴'); showDialogue('金色恶影','無駄無駄！飞刀只会封两道。',2200);} }
function maybeStartBoss(){ if(phase!=='run')return; bossCooldown-=speed; if(score>1800&&bossCooldown<=0){ startBoss(Math.random()<.5?'emerald':'knife'); bossCooldown=5200+Math.random()*2200; } }
function addWarning(lane,z,color,kind){ warnings.push({lane,z,color,kind,life:1}); }
function spawnEmeraldSafeWave(){ const safe=pick(lanes), blocked=lanes.filter(l=>l!==safe), z=H+190; blocked.forEach((lane,i)=>{addWarning(lane,z+i*18,'#62ff9f','emerald'); objects.push({type:'emerald',lane,z:z+150+i*18,hit:false});}); showDialogue('冷面跑者','やれやれだぜ……看准空道。',1250); }
function spawnKnifeSafeWave(){ const safe=pick(lanes), blocked=lanes.filter(l=>l!==safe), z=H+190; blocked.forEach(lane=>{addWarning(lane,z,'#ffd25e','knife'); objects.push({type:'knife',lane,z:z+155,hit:false});}); const line=safe===-1?'左道生路。':safe===0?'中道生路。':'右道生路。'; showDialogue('金色恶影',`ザ・ワールド！${line}`,1300); }

function moveLeft(){ if(running&&!player.dead)player.lane=Math.max(-1,player.lane-1); }
function moveRight(){ if(running&&!player.dead)player.lane=Math.min(1,player.lane+1); }
function jump(){ if(running&&!player.dead&&!player.jumping&&!player.rolling){ player.vy=-16.5; player.jumping=true; showDialogue('冷面跑者','オラ！',650); } }
function roll(){ if(running&&!player.dead&&!player.jumping){ player.rolling=true; player.rollTime=.55; } }
function startHoldCrouch(){ if(running&&!player.dead&&!player.jumping){ keyboardCrouchHeld=true; player.rolling=true; player.rollTime=9999; } }
function stopHoldCrouch(){ keyboardCrouchHeld=false; if(player.rolling&&player.rollTime>1000){player.rolling=false;player.rollTime=0;} }

function triggerDeath(kind){ if(player.dead)return; if(giantTime>0||standTime>0)return; if(shieldTime>0){ shakeTime=.25; flashTime=.14; showToast('蓝盾格挡！'); showDialogue('蓝色护盾','伤害已被护盾挡下。',1100); return; } player.dead=true; phase='death'; const x=laneToX(player.laneX),y=player.y; if(kind==='train'){deathAnim={kind:'train',t:0,x,y,vx:rand(-5,5),vy:-18,rot:0,spin:rand(-18,18)};shakeTime=.8;flashTime=.18;showToast('被火车创飞了！');showDialogue('旁白','列车正面撞上，整个人被掀飞！',1800);} else {deathAnim={kind:'trip',t:0,x,y,vx:rand(-2,2),vy:-7,rot:0,spin:rand(-8,8)};shakeTime=.42;flashTime=.08;showToast('被绊倒了！');showDialogue('旁白','脚下一乱，向前翻滚倒地。',1800);} }
function checkCollision(obj){ const p=project(obj.lane,obj.z); const laneClose=Math.abs(obj.lane-player.laneX)<.42; const zClose=Math.abs(p.y-player.y)<60; if(!laneClose||!zClose)return false; if(['coin','magnet','shield','ruby'].includes(obj.type))return true; if(obj.type==='lowbar')return !player.rolling; if(obj.type==='barrier'||obj.type==='cone')return !player.jumping; if(['knife','emerald','train'].includes(obj.type))return true; return false; }
function handleCollision(obj){ const p=project(obj.lane,obj.z); if(obj.type==='coin'){obj.hit=true;coins++;score+=25;burst(p.x,p.y,'#ffd95e');return;} if(obj.type==='magnet'){obj.hit=true;magnetTime=8;showToast('磁铁启动！');showDialogue('冷面跑者','金币，过来。',1200);burst(p.x,p.y,'#7cfff2');return;} if(obj.type==='shield'){obj.hit=true;shieldTime=8;showToast('蓝色护盾启动！');showDialogue('蓝色护盾','接下来 8 秒内挡下伤害。',1400);burst(p.x,p.y,'#4ea3ff');return;} if(obj.type==='ruby'){obj.hit=true;giantTime=8;standTime=8;slowMoTime=1.15;showBossBanner('替身能力!');showToast('替身能力！');showDialogue('替身能力','白金护卫，挡下这一击！',1800);burst(p.x,p.y,'#ff4d5a');burst(p.x,p.y,'#a855ff');return;}
  if(standTime>0){obj.hit=true;oraCombo++;standPunchTime=.25;score+=obj.type==='train'?220:(obj.type==='knife'||obj.type==='emerald'?110:70);burst(p.x,p.y,'#b764ff');burst(p.x,p.y,'#ffffff');addText(p.x,p.y,'オラ! x'+oraCombo,'#fff26a',28);showToast('替身出拳！');return;}
  if(giantTime>0){obj.hit=true;score+=obj.type==='train'?180:(obj.type==='knife'||obj.type==='emerald'?90:60);burst(p.x,p.y,'#ff5a66');showToast('无敌冲撞！');return;}
  if(shieldTime>0){obj.hit=true;score+=35;burst(p.x,p.y,'#4ea3ff');addText(p.x,p.y,'蓝盾格挡','#9bd4ff',22);showToast('护盾格挡！');return;}
  obj.hit=true;triggerDeath(obj.type==='train'?'train':'trip'); }
function burst(x,y,color){ for(let i=0;i<16;i++)particles.push({x,y,vx:Math.cos(i/16*Math.PI*2)*rand(2,5),vy:Math.sin(i/16*Math.PI*2)*rand(2,5),life:rand(.35,.7),color}); }

function update(dt){ const rawDt=dt; if(slowMoTime>0){dt*=.42; slowMoTime=Math.max(0,slowMoTime-rawDt);} const dt60=dt*60; shakeTime=Math.max(0,shakeTime-rawDt); flashTime=Math.max(0,flashTime-rawDt); standPunchTime=Math.max(0,standPunchTime-rawDt); reviveRiseTime=Math.max(0,reviveRiseTime-rawDt);
  if(player.dead&&deathAnim){deathAnim.t+=rawDt;deathAnim.x+=deathAnim.vx*rawDt*60;deathAnim.y+=deathAnim.vy*rawDt*60;deathAnim.vy+=.9*rawDt*60;deathAnim.rot+=deathAnim.spin*rawDt*60;updateEffects(rawDt,rawDt*60);if(deathAnim.t>1.2)showGameOver();return;}
  speed=Math.min(18,speed+dt*.13); distance+=speed*dt60; score+=speed*dt*6.2; magnetTime=Math.max(0,magnetTime-rawDt); shieldTime=Math.max(0,shieldTime-rawDt); giantTime=Math.max(0,giantTime-rawDt); standTime=Math.max(0,standTime-rawDt); if(standTime<=0)oraCombo=0;
  player.laneX+=(player.lane-player.laneX)*Math.min(1,dt*13); if(player.jumping){player.y+=player.vy*dt60;player.vy+=.72*dt60;if(player.y>=player.baseY){player.y=player.baseY;player.vy=0;player.jumping=false;}} if(player.rolling){if(keyboardCrouchHeld){player.rollTime=9999;}else{player.rollTime-=rawDt;if(player.rollTime<=0)player.rolling=false;}}
  if(phase==='run'){maybeStartBoss();spawnTimer-=dt60*speed;coinTimer-=dt60*speed;powerTimer-=dt60*speed;if(spawnTimer<=0){spawnObstacle();spawnTimer=660+Math.random()*540-speed*22;}if(coinTimer<=0){spawnCoinLine();coinTimer=720+Math.random()*820;}if(powerTimer<=0){spawnPowerup();powerTimer=2600+Math.random()*2300;}}
  else if(phase==='boss'){bossTime+=rawDt;bossAttackTimer-=dt60*speed;if(bossAttackTimer<=0){bossType==='emerald'?spawnEmeraldSafeWave():spawnKnifeSafeWave();bossAttackTimer=bossType==='emerald'?570+Math.random()*220:620+Math.random()*240;}if(bossTime>10){phase='run';showToast('Boss 退场！');showDialogue('冷面跑者','继续前进。',1200);}}
  for(let i=objects.length-1;i>=0;i--){const obj=objects[i];const objSpeed=(obj.type==='emerald'||obj.type==='knife')?speed*1.03:speed;obj.z-=objSpeed*dt60;if(obj.type==='coin'&&magnetTime>0){const p=project(obj.lane,obj.z),px=laneToX(player.laneX);if(Math.abs(p.y-player.y)<260&&Math.abs(p.x-px)<W*.38){obj.lane+=(player.laneX-obj.lane)*.16;obj.z+=(player.y-p.y)*.12;}}if(!obj.hit&&checkCollision(obj))handleCollision(obj);if(obj.z<-180||obj.hit)objects.splice(i,1);}
  for(let i=warnings.length-1;i>=0;i--){warnings[i].life-=rawDt;warnings[i].z-=speed*1.03*dt60;if(warnings[i].life<=0||warnings[i].z<-100)warnings.splice(i,1);} if(Math.random()<.3)speedLines.push({x:rand(0,W),y:rand(0,H*.5),len:rand(40,100),life:.28}); for(let i=speedLines.length-1;i>=0;i--){speedLines[i].life-=rawDt;speedLines[i].y+=speed*dt60;if(speedLines[i].life<=0)speedLines.splice(i,1);} updateEffects(rawDt,rawDt*60); updateHud(); }
function updateEffects(dt,dt60){ for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt60;p.y+=p.vy*dt60;p.life-=dt;if(p.life<=0)particles.splice(i,1);} for(let i=texts.length-1;i>=0;i--){const t=texts[i];t.y+=t.vy*dt60;t.life-=dt;if(t.life<=0)texts.splice(i,1);} }

function draw(){ ctx.clearRect(0,0,W,H); const sx=shakeTime>0?(Math.random()-.5)*10:0, sy=shakeTime>0?(Math.random()-.5)*8:0; ctx.save(); ctx.translate(sx,sy); drawWorld(); drawBoss(); drawWarnings(); drawObjects(); drawPlayer(); drawStand(); drawParticles(); drawTexts(); drawSpeedLines(); drawPowerBars(); ctx.restore(); if(flashTime>0){ctx.fillStyle=`rgba(255,255,255,${Math.min(.7,flashTime*3)})`;ctx.fillRect(0,0,W,H);} if(slowMoTime>0){ctx.fillStyle='rgba(255,77,90,.08)';ctx.fillRect(0,0,W,H);} }
function drawWorld(){ const h=H*.23; const sky=ctx.createLinearGradient(0,0,0,H); sky.addColorStop(0,'#1b2454'); sky.addColorStop(.45,'#102140'); sky.addColorStop(1,'#050812'); ctx.fillStyle=sky; ctx.fillRect(0,0,W,H); drawMoonStars(); drawBuildings(h); ctx.beginPath(); ctx.moveTo(W*.39,h); ctx.lineTo(W*.61,h); ctx.lineTo(W*1.04,H+60); ctx.lineTo(-W*.04,H+60); ctx.closePath(); const road=ctx.createLinearGradient(0,h,0,H); road.addColorStop(0,'#172138'); road.addColorStop(1,'#2b3650'); ctx.fillStyle=road; ctx.fill(); drawRails(); drawLaneLines(); drawTunnelLights(); }
function drawMoonStars(){ ctx.fillStyle='rgba(255,232,123,.85)'; ctx.beginPath(); ctx.arc(W*.82,H*.09,W*.045,0,Math.PI*2); ctx.fill(); for(let i=0;i<30;i++){const x=(i*97+distance*.04)%(W+80)-40,y=25+(i*41%Math.floor(H*.2));ctx.fillStyle=`rgba(255,255,255,${.2+(i%4)*.1})`;ctx.fillRect(x,y,2,2);} }
function drawBuildings(h){ for(let side of[-1,1])for(let i=0;i<8;i++){const bw=W*.11+(i%3)*8,bh=70+(i*33)%110,x=side<0?i*bw*.68-25:W-i*bw*.68-bw+25,y=h-bh+22;ctx.fillStyle=i%2?'#0c1630':'#112247';ctx.fillRect(x,y,bw,bh);ctx.fillStyle='rgba(255,215,109,.22)';for(let r=0;r<5;r++)for(let c=0;c<2;c++)ctx.fillRect(x+12+c*26,y+14+r*20,7,8);} }
function drawRails(){ for(let lane of[-1,0,1])for(let rail of[-.18,.18]){const a=project(lane+rail,H),b=project(lane+rail,-40);ctx.strokeStyle='rgba(160,200,240,.36)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();} for(let z=H+100-(distance%80);z>-100;z-=80){const p=project(0,z);ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=2+p.scale;ctx.beginPath();ctx.moveTo(W/2-W*.42*p.p,p.y);ctx.lineTo(W/2+W*.42*p.p,p.y);ctx.stroke();} }
function drawLaneLines(){ ctx.setLineDash([12,18]); ctx.lineDashOffset=-distance*.7; for(let lane of[-.5,.5]){const a=project(lane,H),b=project(lane,-40);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();} ctx.setLineDash([]); }
function drawTunnelLights(){ for(let z=H+90-(distance%120);z>-80;z-=120){const p=project(0,z);ctx.fillStyle=`rgba(255,214,94,${.12+p.p*.35})`;ctx.beginPath();ctx.ellipse(W*.12,p.y,18*p.scale,6*p.scale,0,0,Math.PI*2);ctx.ellipse(W*.88,p.y,18*p.scale,6*p.scale,0,0,Math.PI*2);ctx.fill();} }
function drawBoss(){ if(phase!=='boss')return; const x=W/2,y=H*.16+Math.sin(bossTime*4)*8; ctx.save();ctx.translate(x,y);ctx.globalAlpha=.95;ctx.fillStyle=bossType==='emerald'?'rgba(70,255,150,.18)':'rgba(255,216,95,.18)';ctx.beginPath();ctx.arc(0,0,76,0,Math.PI*2);ctx.fill();ctx.strokeStyle=bossType==='emerald'?'#62ff9f':'#ffd25e';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,60+Math.sin(bossTime*7)*5,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#161022';roundRect(ctx,-38,-52,76,104,24);ctx.fill();ctx.fillStyle=bossType==='emerald'?'#62ff9f':'#ffd25e';ctx.font='900 28px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(bossType==='emerald'?'绿':'刀',0,0);ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='900 12px system-ui';ctx.fillText('BOSS',0,42);ctx.restore(); }
function drawWarnings(){ for(const w of warnings){const p=project(w.lane,w.z);if(p.y<H*.18||p.y>H+80)continue;ctx.save();ctx.globalAlpha=Math.max(0,w.life/1)*.75;ctx.fillStyle=w.color;ctx.beginPath();ctx.ellipse(p.x,p.y,38*p.scale,16*p.scale,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`900 ${14*p.scale}px system-ui`;ctx.textAlign='center';ctx.fillText('危险',p.x,p.y+4*p.scale);ctx.restore();} }
function drawObjects(){ const sorted=[...objects].sort((a,b)=>b.z-a.z); for(const obj of sorted){const p=project(obj.lane,obj.z);if(p.y<H*.18||p.y>H+120)continue;if(obj.type==='coin')drawCoin(p,obj);else if(obj.type==='magnet')drawPower(p,'磁','#7cfff2');else if(obj.type==='shield')drawPower(p,'盾','#4ea3ff');else if(obj.type==='ruby')drawRuby(p);else if(obj.type==='train')drawTrain(p);else if(obj.type==='lowbar')drawLowbar(p);else if(obj.type==='emerald')drawEmerald(p);else if(obj.type==='knife')drawKnife(p);else drawBarrier(p,obj.type==='cone');} }
function drawCoin(p,o){const r=13*p.scale,b=Math.sin((distance+o.bob)*.08)*5*p.scale;ctx.save();ctx.translate(p.x,p.y+b);ctx.fillStyle='#ffd95e';ctx.beginPath();ctx.ellipse(0,0,r*.7,r,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.fillStyle='rgba(80,50,0,.28)';ctx.fillRect(-r*.12,-r*.55,r*.24,r*1.1);ctx.restore();}
function drawPower(p,label,color){const s=38*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor=color;ctx.shadowBlur=18*p.scale;ctx.fillStyle=color;roundRect(ctx,-s/2,-s/2,s,s,12*p.scale);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#07101d';ctx.font=`900 ${17*p.scale}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,0,1);ctx.restore();}
function drawRuby(p){const r=24*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(distance*.03);ctx.shadowColor='#ff4d5a';ctx.shadowBlur=20*p.scale;ctx.fillStyle='#ff4d5a';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.82,-r*.18);ctx.lineTo(r*.55,r);ctx.lineTo(-r*.55,r);ctx.lineTo(-r*.82,-r*.18);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`900 ${12*p.scale}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('无敌',0,2*p.scale);ctx.restore();}
function drawBarrier(p,cone=false){const w=58*p.scale,h=42*p.scale;ctx.save();ctx.translate(p.x,p.y);if(cone){ctx.fillStyle='#ff8f2c';ctx.beginPath();ctx.moveTo(0,-h*.75);ctx.lineTo(w*.45,h*.45);ctx.lineTo(-w*.45,h*.45);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(-w*.28,h*.02,w*.56,h*.12);}else{ctx.fillStyle='#ffb13b';ctx.fillRect(-w/2,-h/2,w,h);ctx.fillStyle='rgba(80,38,0,.35)';ctx.fillRect(-w/2,-h*.08,w,h*.16);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillRect(-w*.35,-h*.34,w*.7,h*.16);}ctx.restore();}
function drawLowbar(p){const w=86*p.scale,h=70*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.strokeStyle='#ffcc66';ctx.lineWidth=7*p.scale;ctx.beginPath();ctx.moveTo(-w/2,h/2);ctx.lineTo(-w/2,-h/2);ctx.lineTo(w/2,-h/2);ctx.lineTo(w/2,h/2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(-w*.32,-h*.58,w*.64,h*.15);ctx.restore();}
function drawTrain(p){const w=88*p.scale,h=136*p.scale;ctx.save();ctx.translate(p.x,p.y-h*.18);ctx.fillStyle='#8d2036';roundRect(ctx,-w/2,-h/2,w,h,12*p.scale);ctx.fill();ctx.fillStyle='#ea5064';roundRect(ctx,-w*.43,-h*.43,w*.86,h*.86,10*p.scale);ctx.fill();ctx.fillStyle='rgba(160,240,255,.76)';ctx.fillRect(-w*.3,-h*.3,w*.6,h*.22);ctx.fillStyle='#ffd25e';ctx.beginPath();ctx.arc(-w*.25,h*.32,6*p.scale,0,Math.PI*2);ctx.arc(w*.25,h*.32,6*p.scale,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawEmerald(p){const r=22*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(distance*.025);ctx.shadowColor='#62ff9f';ctx.shadowBlur=18*p.scale;ctx.fillStyle='#62ff9f';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.9,-r*.2);ctx.lineTo(r*.55,r);ctx.lineTo(-r*.55,r);ctx.lineTo(-r*.9,-r*.2);ctx.closePath();ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.restore();}
function drawKnife(p){const s=44*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(-.45);ctx.fillStyle='#dfe8ff';ctx.beginPath();ctx.moveTo(-s*.55,-s*.12);ctx.lineTo(s*.35,-s*.12);ctx.lineTo(s*.65,0);ctx.lineTo(s*.35,s*.12);ctx.lineTo(-s*.55,s*.12);ctx.closePath();ctx.fill();ctx.fillStyle='#43255f';ctx.fillRect(-s*.78,-s*.17,s*.25,s*.34);ctx.restore();}
function drawPlayer(){if(player.dead&&deathAnim){drawDeathPlayer();return;}const x=laneToX(player.laneX),y=player.y+(reviveRiseTime>0?Math.sin((1.1-reviveRiseTime)*8)*10:0);const crouchScale=player.rolling?.72:1;const giantScale=giantTime>0?2.25:1;ctx.save();ctx.translate(x,y);if(shieldTime>0){ctx.strokeStyle='rgba(78,163,255,.92)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,-35,42*giantScale,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(78,163,255,.13)';ctx.beginPath();ctx.arc(0,-35,42*giantScale,0,Math.PI*2);ctx.fill();}if(magnetTime>0){ctx.strokeStyle='rgba(124,255,242,.45)';ctx.lineWidth=3;ctx.setLineDash([8,8]);ctx.beginPath();ctx.arc(0,-35,50*giantScale,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}if(giantTime>0){ctx.strokeStyle='rgba(255,77,90,.95)';ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,-40,58*giantScale,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,77,90,.18)';ctx.beginPath();ctx.arc(0,-40,58*giantScale,0,Math.PI*2);ctx.fill();}ctx.scale(giantScale,giantScale*crouchScale);drawPixelHero(0,0);ctx.restore();}
function drawStand(){if(standTime<=0||player.dead)return;const px=laneToX(player.laneX),py=player.y;const punch=standPunchTime>0?18:0;ctx.save();ctx.translate(px+54+punch,py-12);ctx.globalAlpha=.84+Math.sin(performance.now()*.01)*.08;ctx.shadowColor='#b764ff';ctx.shadowBlur=18;ctx.fillStyle='rgba(183,100,255,.18)';ctx.beginPath();ctx.arc(0,-42,44,0,Math.PI*2);ctx.fill();ctx.fillStyle='#b764ff';roundRect(ctx,-15,-72,30,28,10);ctx.fill();ctx.fillStyle='#d8b4ff';roundRect(ctx,-12,-42,24,16,8);ctx.fill();ctx.fillStyle='#8f47ff';roundRect(ctx,-22,-26,44,38,12);ctx.fill();ctx.fillStyle='#c798ff';roundRect(ctx,-34-punch*.2,-18,12,30,8);roundRect(ctx,22+punch,-18,12,30,8);roundRect(ctx,-16,12,12,32,8);roundRect(ctx,4,12,12,32,8);ctx.fill();ctx.fillStyle='rgba(255,255,255,.86)';ctx.beginPath();ctx.arc(-5,-58,3,0,Math.PI*2);ctx.arc(5,-58,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='900 11px system-ui';ctx.textAlign='center';ctx.fillText('替身',0,-88);ctx.restore();}
function drawDeathPlayer(){const d=deathAnim;ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot*Math.PI/180);ctx.globalAlpha=Math.max(.25,1-d.t*.35);drawPixelHero(0,0);ctx.restore();}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}function drawPixelHero(cx,cy){const ox=cx-24,oy=cy-86;rect(ox+12,oy+0,24,4,'#101018');rect(ox+8,oy+4,36,4,'#101018');rect(ox+16,oy+8,20,4,'#232036');rect(ox+36,oy+8,8,4,'#101018');rect(ox+16,oy+12,20,4,'#efc18e');rect(ox+16,oy+16,20,4,'#e4ae7c');rect(ox+20,oy+20,12,4,'#efc18e');rect(ox+12,oy+12,8,4,'#101018');rect(ox+36,oy+12,8,4,'#101018');rect(ox+22,oy+16,4,4,'#111');rect(ox+32,oy+16,4,4,'#111');rect(ox+12,oy+24,28,8,'#241a46');rect(ox+8,oy+32,36,8,'#34216b');rect(ox+8,oy+40,36,8,'#4f34a7');rect(ox+8,oy+48,36,8,'#4f34a7');rect(ox+8,oy+56,36,8,'#3a247a');rect(ox+8,oy+64,36,8,'#2b1c5e');rect(ox+4,oy+32,8,20,'#241a46');rect(ox+44,oy+32,8,20,'#241a46');rect(ox+4,oy+52,8,8,'#efc18e');rect(ox+44,oy+52,8,8,'#efc18e');rect(ox+16,oy+72,8,16,'#1d2440');rect(ox+32,oy+72,8,16,'#1d2440');rect(ox+12,oy+88,12,4,'#d7e2ff');rect(ox+32,oy+88,12,4,'#d7e2ff');rect(ox+40,oy+28,4,4,'#ffd95e');rect(ox+44,oy+32,4,4,'#ffd95e');rect(ox+40,oy+36,4,4,'#ffd95e');ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(ox+12,oy+40,4,28);ctx.fillStyle='#ffd95e';ctx.font='900 12px system-ui';ctx.fillText('★',ox+24,oy+38);}
function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/.7);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
function drawTexts(){for(const t of texts){ctx.globalAlpha=Math.max(0,t.life/.7);ctx.fillStyle=t.color;ctx.font=`1000 ${t.size}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeStyle='#7a3dff';ctx.lineWidth=4;ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);}ctx.globalAlpha=1;}
function drawSpeedLines(){ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=2;for(const l of speedLines){ctx.globalAlpha=Math.max(0,l.life/.28);ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x-l.len*.25,l.y+l.len);ctx.stroke();}ctx.globalAlpha=1;}
function drawPowerBars(){let y=64;if(magnetTime>0){drawBar('磁铁',magnetTime/8,'#7cfff2',y);y+=20;}if(shieldTime>0){drawBar('蓝盾',shieldTime/8,'#4ea3ff',y);y+=20;}if(giantTime>0){drawBar('无敌',giantTime/8,'#ff4d5a',y);y+=20;}if(standTime>0){drawBar('替身',standTime/8,'#b764ff',y);y+=20;}if(phase==='boss')drawBar('BOSS',1-bossTime/10,bossType==='emerald'?'#62ff9f':'#ffd25e',y);}
function drawBar(label,pct,color,y){const x=16,w=112;ctx.fillStyle='rgba(255,255,255,.15)';roundRect(ctx,x,y,w,11,999);ctx.fill();ctx.fillStyle=color;roundRect(ctx,x,y,w*Math.max(0,Math.min(1,pct)),11,999);ctx.fill();ctx.fillStyle='rgba(255,255,255,.86)';ctx.font='900 11px system-ui';ctx.fillText(label,x+w+8,y+10);}
function roundRect(ctx,x,y,w,h,r){const rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();}
function loop(now){if(!running)return;const dt=Math.min((now-lastTime)/1000,.033);lastTime=now;update(dt);draw();requestAnimationFrame(loop);}
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowleft'||k==='a')moveLeft();if(k==='arrowright'||k==='d')moveRight();if(k==='arrowup'||k==='w'||k===' ')jump();if(k==='arrowdown'||k==='s')startHoldCrouch();});
window.addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k==='arrowdown'||k==='s')stopHoldCrouch();});
let startX=0,startY=0;wrap.addEventListener('pointerdown',e=>{startX=e.clientX;startY=e.clientY;});wrap.addEventListener('pointerup',e=>{const dx=e.clientX-startX,dy=e.clientY-startY,ax=Math.abs(dx),ay=Math.abs(dy);if(Math.max(ax,ay)<24)return;if(ax>ay)dx<0?moveLeft():moveRight();else dy<0?jump():roll();});
window.addEventListener('resize',resize);startBtn.addEventListener('click',startGame);resize();draw();
</script>
</body>

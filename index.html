<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星尘城市跑酷</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 15%, rgba(122, 76, 255, .28), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(255, 215, 86, .18), transparent 26%),
        linear-gradient(160deg, #080918, #07111f 58%, #02040a);
      user-select: none;
    }

    .game-wrap {
      position: relative;
      width: min(96vw, 540px);
      height: min(96vh, 860px);
      height: min(96dvh, 860px);
      min-height: 560px;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.2);
      background: #07111f;
      box-shadow: 0 30px 90px rgba(0,0,0,.6);
      touch-action: none;
    }

    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .hud {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      pointer-events: none;
    }

    .badge {
      padding: 7px 4px;
      border-radius: 14px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .badge small { display: block; color: rgba(255,255,255,.68); font-size: 10px; }
    .badge strong { font-size: 17px; line-height: 1.1; }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(2,4,16,.66);
      backdrop-filter: blur(8px);
    }

    .card {
      width: min(94%, 430px);
      text-align: center;
      padding: 24px 20px;
      border-radius: 28px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }

    h1 { margin: 0 0 8px; font-size: clamp(34px, 9vw, 58px); letter-spacing: 2px; text-shadow: 0 8px 28px rgba(0,0,0,.42); }
    .card p { margin: 10px auto 18px; color: rgba(255,255,255,.84); line-height: 1.65; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: #070915;
      background: linear-gradient(90deg, #78fff2, #fff1a5, #ffd25e);
      box-shadow: 0 12px 34px rgba(255,210,94,.25);
    }
    .secondary { color: white; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.24); box-shadow: none; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .toast {
      position: absolute;
      left: 50%;
      top: 74px;
      z-index: 8;
      transform: translateX(-50%);
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      backdrop-filter: blur(12px);
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { animation: toastShow 1.1s ease-out forwards; }
    @keyframes toastShow {
      0% { opacity: 0; transform: translate(-50%, -10px); }
      20%, 80% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }

    .boss-banner {
      position: absolute;
      left: 0;
      right: 0;
      top: 42%;
      z-index: 9;
      text-align: center;
      font-size: clamp(34px, 10vw, 64px);
      font-weight: 1000;
      letter-spacing: 4px;
      color: #fff06a;
      text-shadow: 4px 4px 0 #7d32ff, 0 0 28px rgba(255,240,106,.75);
      pointer-events: none;
      opacity: 0;
      transform: rotate(-6deg) scale(.8);
    }
    .boss-banner.show { animation: bossBanner 1.5s ease-out forwards; }
    @keyframes bossBanner {
      0% { opacity: 0; transform: rotate(-6deg) scale(.6); }
      20%, 75% { opacity: 1; transform: rotate(-6deg) scale(1); }
      100% { opacity: 0; transform: rotate(-6deg) scale(1.18); }
    }

    @media (max-width: 560px) {
      .game-wrap { width: 100vw; height: 100vh; height: 100dvh; min-height: 0; border-radius: 0; border: 0; }
      .hud { left: 7px; right: 7px; top: 7px; gap: 4px; }
      .badge { border-radius: 12px; padding: 6px 2px; }
      .badge strong { font-size: 15px; }
      .card { padding: 22px 18px; }
    }
  </style>
</head>
<body>
  <main class="game-wrap" id="gameWrap">
    <canvas id="gameCanvas"></canvas>
    <section class="hud">
      <div class="badge"><small>分数</small><strong id="scoreEl">0</strong></div>
      <div class="badge"><small>金币</small><strong id="coinEl">0</strong></div>
      <div class="badge"><small>速度</small><strong id="speedEl">1.0x</strong></div>
      <div class="badge"><small>阶段</small><strong id="phaseEl">跑酷</strong></div>
    </section>
    <div class="toast" id="toast">提示</div>
    <div class="boss-banner" id="bossBanner">BOSS!</div>
    <section class="overlay" id="overlay">
      <div class="card">
        <h1>星尘城市跑酷</h1>
        <p>JOJO 风格致敬版跑酷：更强透视、死亡动画、绿宝石弹幕 Boss、飞刀 Boss。<br>手机滑动 / 电脑方向键或 WASD。</p>
        <div class="btn-row"><button id="startBtn">开始游戏</button></div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('gameWrap');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const scoreEl = document.getElementById('scoreEl');
    const coinEl = document.getElementById('coinEl');
    const speedEl = document.getElementById('speedEl');
    const phaseEl = document.getElementById('phaseEl');
    const toast = document.getElementById('toast');
    const bossBanner = document.getElementById('bossBanner');

    let W = 0, H = 0, dpr = 1;
    let running = false;
    let lastTime = 0;
    let score = 0, coins = 0, speed = 7, distance = 0;
    let spawnTimer = 0, coinTimer = 0, powerTimer = 0;
    let shakeTime = 0, flashTime = 0;
    let magnetTime = 0, shieldTime = 0;
    let phase = 'run';
    let bossType = 'emerald';
    let bossTime = 0;
    let bossCooldown = 900;
    let objects = [];
    let particles = [];
    let speedLines = [];
    let deathAnim = null;

    const player = {
      lane: 0, laneX: 0, y: 0, baseY: 0,
      w: 46, h: 78, vy: 0,
      jumping: false, rolling: false, rollTime: 0,
      dead: false, deathKind: ''
    };

    const laneList = [-1, 0, 1];

    function resize() {
      const r = wrap.getBoundingClientRect();
      dpr = Math.max(1, Math.min(devicePixelRatio || 1, 2));
      W = Math.floor(r.width); H = Math.floor(r.height);
      canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      player.baseY = H - 112;
      if (!player.jumping && !player.dead) player.y = player.baseY;
      player.w = Math.max(38, Math.min(54, W * .1));
      player.h = player.w * 1.7;
      draw();
    }

    function rnd(min, max) { return Math.random() * (max - min) + min; }
    function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.remove('show');
      void toast.offsetWidth;
      toast.classList.add('show');
    }

    function showBossBanner(text) {
      bossBanner.textContent = text;
      bossBanner.classList.remove('show');
      void bossBanner.offsetWidth;
      bossBanner.classList.add('show');
    }

    function laneToX(lane) {
      return W / 2 + lane * W * .255;
    }

    function project(lane, z) {
      const horizonY = H * .23;
      const t = Math.max(0, Math.min(1, 1 - z / H));
      const p = t * t;
      const laneGap = W * (.052 + .248 * p);
      return {
        x: W / 2 + lane * laneGap,
        y: horizonY + (H - horizonY) * p,
        scale: .24 + p * 1.12,
        p
      };
    }

    function resetGame() {
      running = false;
      score = 0; coins = 0; speed = 7; distance = 0;
      spawnTimer = 200; coinTimer = 450; powerTimer = 2500;
      shakeTime = 0; flashTime = 0; magnetTime = 0; shieldTime = 0;
      phase = 'run'; bossType = 'emerald'; bossTime = 0; bossCooldown = 850;
      objects = []; particles = []; speedLines = [];
      deathAnim = null;
      player.lane = 0; player.laneX = 0; player.y = player.baseY; player.vy = 0;
      player.jumping = false; player.rolling = false; player.rollTime = 0;
      player.dead = false; player.deathKind = '';
      updateHud();
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.style.display = 'none';
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function updateHud() {
      scoreEl.textContent = Math.floor(score);
      coinEl.textContent = coins;
      speedEl.textContent = (speed / 7).toFixed(1) + 'x';
      phaseEl.textContent = phase === 'boss' ? (bossType === 'emerald' ? '绿弹幕' : '飞刀') : '跑酷';
    }

    function endGame() {
      running = false;
      overlay.innerHTML = `
        <div class="card">
          <h1>游戏结束</h1>
          <p>分数：<strong>${Math.floor(score)}</strong><br>金币：<strong>${coins}</strong></p>
          <div class="btn-row">
            <button id="againBtn">再玩一次</button>
            <button class="secondary" id="homeBtn">首页</button>
          </div>
        </div>`;
      overlay.style.display = 'grid';
      document.getElementById('againBtn').addEventListener('click', startGame);
      document.getElementById('homeBtn').addEventListener('click', () => {
        overlay.innerHTML = `<div class="card"><h1>星尘城市跑酷</h1><p>JOJO 风格致敬版跑酷：更强透视、死亡动画、绿宝石弹幕 Boss、飞刀 Boss。</p><div class="btn-row"><button id="startBtn2">开始游戏</button></div></div>`;
        document.getElementById('startBtn2').addEventListener('click', startGame);
      });
    }

    function triggerDeath(kind) {
      if (player.dead) return;
      if (shieldTime > 0) {
        shieldTime = 0;
        shakeTime = .25;
        flashTime = .16;
        showToast('护盾抵消撞击！');
        return;
      }
      player.dead = true;
      player.deathKind = kind;
      phase = 'death';
      shakeTime = kind === 'train' ? .85 : .45;
      flashTime = kind === 'train' ? .25 : .1;
      deathAnim = {
        kind,
        t: 0,
        x: laneToX(player.laneX),
        y: player.y,
        vx: kind === 'train' ? rnd(-7, 7) : rnd(-2, 2),
        vy: kind === 'train' ? -18 : -7,
        rot: 0,
        spin: kind === 'train' ? rnd(-18, 18) : rnd(-8, 8)
      };
      showToast(kind === 'train' ? '被撞飞了！' : '被绊倒了！');
    }

    function maybeStartBoss() {
      if (phase !== 'run') return;
      bossCooldown -= speed;
      if (score > 500 && bossCooldown <= 0) {
        phase = 'boss';
        bossTime = 0;
        bossType = Math.random() < .5 ? 'emerald' : 'knife';
        bossCooldown = 1600 + Math.random() * 900;
        objects = objects.filter(o => o.type === 'coin');
        showBossBanner(bossType === 'emerald' ? 'EMERALD SPLASH!' : 'KNIFE STORM!');
        showToast(bossType === 'emerald' ? 'Boss：绿宝石弹幕！' : 'Boss：飞刀攻击！');
      }
    }

    function spawnObstacle() {
      const type = Math.random() > .72 ? 'train' : (Math.random() > .55 ? 'lowbar' : (Math.random() > .5 ? 'cone' : 'barrier'));
      const lane = choice(laneList);
      objects.push({ type, lane, z: H + 160, hit: false });
      if (Math.random() < .28) {
        const lane2 = choice(laneList.filter(l => l !== lane));
        objects.push({ type: Math.random() < .5 ? 'cone' : 'barrier', lane: lane2, z: H + 245, hit: false });
      }
    }

    function spawnCoinLine() {
      const lane = choice(laneList);
      const count = 5 + Math.floor(Math.random() * 5);
      for (let i = 0; i < count; i++) objects.push({ type: 'coin', lane, z: H + 110 + i * 64, hit: false, bob: rnd(0, 10) });
    }

    function spawnPowerup() {
      objects.push({ type: Math.random() < .5 ? 'magnet' : 'shield', lane: choice(laneList), z: H + 150, hit: false });
    }

    function spawnEmeraldWave() {
      const pattern = Math.random();
      if (pattern < .45) {
        const safe = choice(laneList);
        laneList.forEach(l => { if (l !== safe) objects.push({ type: 'emerald', lane: l, z: H + 130, hit: false }); });
        showToast('绿色弹幕！找安全道！');
      } else {
        const lane = choice(laneList);
        for (let i = 0; i < 4; i++) objects.push({ type: 'emerald', lane, z: H + 100 + i * 80, hit: false });
      }
    }

    function spawnKnifeWave() {
      const pattern = Math.random();
      if (pattern < .5) {
        laneList.forEach((l, i) => objects.push({ type: 'knife', lane: l, z: H + 110 + i * 55, hit: false, low: Math.random() < .45 }));
      } else {
        const lane = choice(laneList);
        objects.push({ type: 'knife', lane, z: H + 120, hit: false, low: false });
        objects.push({ type: 'knife', lane: Math.max(-1, lane - 1), z: H + 210, hit: false, low: true });
        objects.push({ type: 'knife', lane: Math.min(1, lane + 1), z: H + 300, hit: false, low: false });
      }
      showToast('飞刀来袭！');
    }

    function moveLeft() { if (running && !player.dead) player.lane = Math.max(-1, player.lane - 1); }
    function moveRight() { if (running && !player.dead) player.lane = Math.min(1, player.lane + 1); }
    function jump() { if (running && !player.dead && !player.jumping && !player.rolling) { player.vy = -16.5; player.jumping = true; } }
    function roll() { if (running && !player.dead && !player.jumping) { player.rolling = true; player.rollTime = .55; } }

    function update(dt) {
      const dt60 = dt * 60;
      shakeTime = Math.max(0, shakeTime - dt);
      flashTime = Math.max(0, flashTime - dt);

      if (player.dead && deathAnim) {
        deathAnim.t += dt;
        deathAnim.x += deathAnim.vx * dt60;
        deathAnim.y += deathAnim.vy * dt60;
        deathAnim.vy += 0.9 * dt60;
        deathAnim.rot += deathAnim.spin * dt60;
        if (deathAnim.t > 1.25) endGame();
        return;
      }

      speed = Math.min(18, speed + dt * .13);
      distance += speed * dt60;
      score += speed * dt * 6.3;
      magnetTime = Math.max(0, magnetTime - dt);
      shieldTime = Math.max(0, shieldTime - dt);

      player.laneX += (player.lane - player.laneX) * Math.min(1, dt * 13);
      if (player.jumping) {
        player.y += player.vy * dt60;
        player.vy += .72 * dt60;
        if (player.y >= player.baseY) { player.y = player.baseY; player.vy = 0; player.jumping = false; }
      }
      if (player.rolling) { player.rollTime -= dt; if (player.rollTime <= 0) player.rolling = false; }

      if (phase === 'run') {
        maybeStartBoss();
        spawnTimer -= dt60 * speed;
        coinTimer -= dt60 * speed;
        powerTimer -= dt60 * speed;
        if (spawnTimer <= 0) { spawnObstacle(); spawnTimer = 650 + Math.random() * 520 - speed * 22; }
        if (coinTimer <= 0) { spawnCoinLine(); coinTimer = 680 + Math.random() * 760; }
        if (powerTimer <= 0) { spawnPowerup(); powerTimer = 3300 + Math.random() * 3300; }
      } else if (phase === 'boss') {
        bossTime += dt;
        if (bossType === 'emerald') {
          spawnTimer -= dt60 * speed;
          if (spawnTimer <= 0) { spawnEmeraldWave(); spawnTimer = 360 + Math.random() * 220; }
        } else {
          spawnTimer -= dt60 * speed;
          if (spawnTimer <= 0) { spawnKnifeWave(); spawnTimer = 410 + Math.random() * 260; }
        }
        coinTimer -= dt60 * speed;
        if (coinTimer <= 0) { spawnCoinLine(); coinTimer = 900; }
        if (bossTime > 17) { phase = 'run'; showToast('Boss 退场！'); }
      }

      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        const objSpeed = (obj.type === 'emerald' || obj.type === 'knife') ? speed * 1.18 : speed;
        obj.z -= objSpeed * dt60;
        if (obj.type === 'coin' && magnetTime > 0) {
          const p = project(obj.lane, obj.z);
          const px = laneToX(player.laneX);
          if (Math.abs(p.y - player.y) < 260 && Math.abs(p.x - px) < W * .38) {
            obj.lane += (player.laneX - obj.lane) * .16;
            obj.z += (player.y - p.y) * .12;
          }
        }
        if (!obj.hit && checkCollision(obj)) handleCollision(obj);
        if (obj.z < -180 || obj.hit) objects.splice(i, 1);
      }

      if (Math.random() < .35) speedLines.push({ x: rnd(0, W), y: rnd(0, H * .5), len: rnd(40, 100), life: .28 });
      for (let i = speedLines.length - 1; i >= 0; i--) { speedLines[i].life -= dt; speedLines[i].y += speed * 8 * dt60 / 8; if (speedLines[i].life <= 0) speedLines.splice(i, 1); }
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx * dt60; p.y += p.vy * dt60; p.life -= dt; if (p.life <= 0) particles.splice(i, 1); }

      updateHud();
    }

    function checkCollision(obj) {
      const p = project(obj.lane, obj.z);
      const laneClose = Math.abs(obj.lane - player.laneX) < .42;
      const zClose = Math.abs(p.y - player.y) < 58;
      if (!laneClose || !zClose) return false;
      if (obj.type === 'coin' || obj.type === 'magnet' || obj.type === 'shield') return true;
      if (obj.type === 'lowbar') return !player.rolling;
      if (obj.type === 'barrier' || obj.type === 'cone') return !player.jumping;
      if (obj.type === 'knife') return obj.low ? !player.rolling : true;
      if (obj.type === 'emerald') return true;
      if (obj.type === 'train') return true;
      return false;
    }

    function handleCollision(obj) {
      if (obj.type === 'coin') { obj.hit = true; coins++; score += 25; burst(project(obj.lane, obj.z).x, project(obj.lane, obj.z).y, '#ffd75e'); return; }
      if (obj.type === 'magnet') { obj.hit = true; magnetTime = 8; showToast('磁铁启动！'); burst(project(obj.lane, obj.z).x, project(obj.lane, obj.z).y, '#78fff2'); return; }
      if (obj.type === 'shield') { obj.hit = true; shieldTime = 8; showToast('护盾启动！'); burst(project(obj.lane, obj.z).x, project(obj.lane, obj.z).y, '#a6ff78'); return; }
      obj.hit = true;
      triggerDeath(obj.type === 'train' ? 'train' : 'trip');
    }

    function burst(x, y, color) {
      for (let i = 0; i < 18; i++) particles.push({ x, y, vx: Math.cos(i / 18 * Math.PI * 2) * rnd(2, 5), vy: Math.sin(i / 18 * Math.PI * 2) * rnd(2, 5), life: rnd(.35, .7), color });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const sx = shakeTime > 0 ? (Math.random() - .5) * 12 : 0;
      const sy = shakeTime > 0 ? (Math.random() - .5) * 10 : 0;
      ctx.save(); ctx.translate(sx, sy);
      drawWorld(); drawBoss(); drawObjects(); drawPlayer(); drawParticles(); drawSpeedLines(); drawPowerBars();
      ctx.restore();
      if (flashTime > 0) { ctx.fillStyle = `rgba(255,255,255,${Math.min(.75, flashTime * 3)})`; ctx.fillRect(0,0,W,H); }
    }

    function drawWorld() {
      const horizon = H * .23;
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#1c2354'); sky.addColorStop(.45, '#102241'); sky.addColorStop(1, '#050711');
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
      drawMoonAndStars(); drawBuildings(horizon);
      ctx.beginPath(); ctx.moveTo(W*.39, horizon); ctx.lineTo(W*.61, horizon); ctx.lineTo(W*1.04, H+60); ctx.lineTo(-W*.04, H+60); ctx.closePath();
      const road = ctx.createLinearGradient(0, horizon, 0, H); road.addColorStop(0, '#172138'); road.addColorStop(1, '#2b3650'); ctx.fillStyle = road; ctx.fill();
      drawRails(); drawLaneLines(); drawTunnelLights();
    }

    function drawMoonAndStars() {
      ctx.fillStyle = 'rgba(255,232,123,.85)'; ctx.beginPath(); ctx.arc(W*.82, H*.09, W*.045, 0, Math.PI*2); ctx.fill();
      for (let i = 0; i < 35; i++) { const x = (i * 97 + distance*.04) % (W+80) - 40; const y = 30 + (i*41 % Math.floor(H*.22)); ctx.fillStyle = `rgba(255,255,255,${.2 + (i%4)*.11})`; ctx.fillRect(x, y, 2, 2); }
    }

    function drawBuildings(horizon) {
      for (let side of [-1,1]) for (let i=0;i<9;i++) { const bw=W*.105+(i%3)*8, bh=70+(i*37)%120; const x=side<0?i*bw*.68-25:W-i*bw*.68-bw+25; const y=horizon-bh+25; ctx.fillStyle=i%2?'#0c1630':'#101f42'; ctx.fillRect(x,y,bw,bh); ctx.fillStyle='rgba(255,215,109,.22)'; for(let r=0;r<5;r++)for(let c=0;c<2;c++)ctx.fillRect(x+12+c*26,y+14+r*20,7,8); }
    }

    function drawRails() {
      for (let lane of [-1,0,1]) for (let rail of [-.18,.18]) { const a=project(lane+rail,H), b=project(lane+rail,-40); ctx.strokeStyle='rgba(160,200,240,.38)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
      for (let z = H + 100 - (distance % 80); z > -100; z -= 80) { const p=project(0,z); ctx.strokeStyle='rgba(255,255,255,.16)'; ctx.lineWidth=2+p.scale; ctx.beginPath(); ctx.moveTo(W/2-W*.42*p.p,p.y); ctx.lineTo(W/2+W*.42*p.p,p.y); ctx.stroke(); }
    }

    function drawLaneLines() {
      ctx.setLineDash([12,18]); ctx.lineDashOffset=-distance*.7;
      for (let lane of [-.5,.5]) { const a=project(lane,H), b=project(lane,-40); ctx.strokeStyle='rgba(255,255,255,.26)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
      ctx.setLineDash([]);
    }

    function drawTunnelLights() {
      for (let z = H + 90 - (distance % 120); z > -80; z -= 120) { const p=project(0,z); ctx.fillStyle=`rgba(255,214,94,${.12+p.p*.35})`; ctx.beginPath(); ctx.ellipse(W*.12, p.y, 18*p.scale, 6*p.scale, 0,0,Math.PI*2); ctx.ellipse(W*.88, p.y, 18*p.scale, 6*p.scale, 0,0,Math.PI*2); ctx.fill(); }
    }

    function drawBoss() {
      if (phase !== 'boss') return;
      const x = W/2, y = H*.16 + Math.sin(bossTime*4)*8;
      ctx.save(); ctx.translate(x,y);
      ctx.globalAlpha = .96;
      ctx.fillStyle = bossType === 'emerald' ? 'rgba(55,255,148,.2)' : 'rgba(255,213,80,.18)'; ctx.beginPath(); ctx.arc(0,0,74,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = bossType === 'emerald' ? '#62ff9f' : '#ffd25e'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,58+Math.sin(bossTime*7)*5,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#151022'; ctx.beginPath(); ctx.roundRect(-38,-52,76,104,24); ctx.fill();
      ctx.fillStyle = bossType === 'emerald' ? '#62ff9f' : '#ffd25e'; ctx.font='900 28px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(bossType==='emerald'?'绿':'刀',0,0);
      ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='900 12px system-ui'; ctx.fillText('BOSS',0,42);
      ctx.restore();
    }

    function drawObjects() {
      const sorted = [...objects].sort((a,b)=>b.z-a.z);
      for (const obj of sorted) { const p=project(obj.lane,obj.z); if (p.y < H*.18 || p.y > H+120) continue; if(obj.type==='coin')drawCoin(p,obj); else if(obj.type==='magnet')drawPower(p,'磁','#78fff2'); else if(obj.type==='shield')drawPower(p,'盾','#a6ff78'); else if(obj.type==='train')drawTrain(p); else if(obj.type==='lowbar')drawLowbar(p); else if(obj.type==='emerald')drawEmerald(p); else if(obj.type==='knife')drawKnife(p,obj.low); else drawBarrier(p,obj.type==='cone'); }
    }

    function drawCoin(p,obj){const r=13*p.scale,b=Math.sin((distance+obj.bob)*.08)*5*p.scale;ctx.save();ctx.translate(p.x,p.y+b);ctx.fillStyle='#ffd75e';ctx.beginPath();ctx.ellipse(0,0,r*.7,r,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.fillStyle='rgba(80,50,0,.3)';ctx.fillRect(-r*.12,-r*.55,r*.24,r*1.1);ctx.restore();}
    function drawPower(p,label,color){const s=38*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor=color;ctx.shadowBlur=18*p.scale;ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(-s/2,-s/2,s,s,12*p.scale);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#070915';ctx.font=`900 ${17*p.scale}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,0,1);ctx.restore();}
    function drawBarrier(p,cone=false){const w=58*p.scale,h=42*p.scale;ctx.save();ctx.translate(p.x,p.y);if(cone){ctx.fillStyle='#ff8f2c';ctx.beginPath();ctx.moveTo(0,-h*.75);ctx.lineTo(w*.45,h*.45);ctx.lineTo(-w*.45,h*.45);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(-w*.28,h*.02,w*.56,h*.12)}else{ctx.fillStyle='#ffb13b';ctx.fillRect(-w/2,-h/2,w,h);ctx.fillStyle='rgba(80,38,0,.35)';ctx.fillRect(-w/2,-h*.08,w,h*.16);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillRect(-w*.35,-h*.34,w*.7,h*.16)}ctx.restore();}
    function drawLowbar(p){const w=86*p.scale,h=70*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.strokeStyle='#ffcc66';ctx.lineWidth=7*p.scale;ctx.beginPath();ctx.moveTo(-w/2,h/2);ctx.lineTo(-w/2,-h/2);ctx.lineTo(w/2,-h/2);ctx.lineTo(w/2,h/2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(-w*.32,-h*.58,w*.64,h*.15);ctx.restore();}
    function drawTrain(p){const w=88*p.scale,h=136*p.scale;ctx.save();ctx.translate(p.x,p.y-h*.18);ctx.fillStyle='#8c1f35';ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,12*p.scale);ctx.fill();ctx.fillStyle='#e84d62';ctx.beginPath();ctx.roundRect(-w*.43,-h*.43,w*.86,h*.86,10*p.scale);ctx.fill();ctx.fillStyle='rgba(160,240,255,.78)';ctx.fillRect(-w*.3,-h*.3,w*.6,h*.22);ctx.fillStyle='#ffd25e';ctx.beginPath();ctx.arc(-w*.25,h*.32,6*p.scale,0,Math.PI*2);ctx.arc(w*.25,h*.32,6*p.scale,0,Math.PI*2);ctx.fill();ctx.restore();}
    function drawEmerald(p){const r=22*p.scale;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(distance*.025);ctx.shadowColor='#62ff9f';ctx.shadowBlur=18*p.scale;ctx.fillStyle='#62ff9f';ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.9,-r*.2);ctx.lineTo(r*.55,r);ctx.lineTo(-r*.55,r);ctx.lineTo(-r*.9,-r*.2);ctx.closePath();ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2*p.scale;ctx.stroke();ctx.restore();}
    function drawKnife(p,low){const s=44*p.scale;ctx.save();ctx.translate(p.x,p.y+(low?18*p.scale:0));ctx.rotate(-.45);ctx.fillStyle='#dce8ff';ctx.beginPath();ctx.moveTo(-s*.55,-s*.12);ctx.lineTo(s*.35,-s*.12);ctx.lineTo(s*.65,0);ctx.lineTo(s*.35,s*.12);ctx.lineTo(-s*.55,s*.12);ctx.closePath();ctx.fill();ctx.fillStyle='#3b2459';ctx.fillRect(-s*.78,-s*.17,s*.25,s*.34);ctx.restore();}

    function drawPlayer() {
      if (player.dead && deathAnim) return drawDeathPlayer();
      const x=laneToX(player.laneX), y=player.y, roll=player.rolling?.62:1, w=player.w, h=player.h*roll;
      ctx.save();ctx.translate(x,y);
      if(shieldTime>0){ctx.strokeStyle='rgba(166,255,120,.8)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,-h/2,Math.max(w,h)*.65,0,Math.PI*2);ctx.stroke();}
      if(magnetTime>0){ctx.strokeStyle='rgba(120,255,242,.45)';ctx.lineWidth=3;ctx.setLineDash([8,8]);ctx.beginPath();ctx.arc(0,-h/2,Math.max(w,h)*.95,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
      ctx.fillStyle='#f7c75d';ctx.beginPath();ctx.arc(0,-h-12,w*.28,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#7b5cff';ctx.beginPath();ctx.roundRect(-w/2,-h,w,h*.78,12);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(-w*.24,-h*.78,w*.16,h*.16);ctx.fillRect(w*.08,-h*.78,w*.16,h*.16);
      ctx.strokeStyle='#ffd25e';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-w*.42,-h*.55);ctx.lineTo(-w*.72,-h*.28);ctx.moveTo(w*.42,-h*.55);ctx.lineTo(w*.72,-h*.28);ctx.stroke();
      ctx.strokeStyle='#fff';ctx.beginPath();ctx.moveTo(-w*.22,-h*.25);ctx.lineTo(-w*.32,-h*.02);ctx.moveTo(w*.22,-h*.25);ctx.lineTo(w*.32,-h*.02);ctx.stroke();ctx.restore();
    }

    function drawDeathPlayer(){const d=deathAnim,w=player.w,h=player.h;ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot*Math.PI/180);ctx.globalAlpha=Math.max(.25,1-d.t*.35);ctx.fillStyle='#f7c75d';ctx.beginPath();ctx.arc(0,-h-12,w*.28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7b5cff';ctx.beginPath();ctx.roundRect(-w/2,-h,w,h*.78,12);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-w*.45,-h*.55);ctx.lineTo(-w*.85,-h*.9);ctx.moveTo(w*.45,-h*.55);ctx.lineTo(w*.85,-h*.15);ctx.moveTo(-w*.25,-h*.2);ctx.lineTo(-w*.55,h*.05);ctx.moveTo(w*.25,-h*.2);ctx.lineTo(w*.65,h*.02);ctx.stroke();ctx.restore();}

    function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/.7);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
    function drawSpeedLines(){ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;for(const l of speedLines){ctx.globalAlpha=Math.max(0,l.life/.28);ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x-l.len*.25,l.y+l.len);ctx.stroke();}ctx.globalAlpha=1;}
    function drawPowerBars(){let y=64;if(magnetTime>0){drawBar('磁铁',magnetTime/8,'#78fff2',y);y+=20;}if(shieldTime>0)drawBar('护盾',shieldTime/8,'#a6ff78',y);if(phase==='boss')drawBar('BOSS',1-bossTime/17,bossType==='emerald'?'#62ff9f':'#ffd25e',y+20);}
    function drawBar(label,pct,color,y){const x=16,w=112;ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(x,y,w,11,999);ctx.fill();ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,y,w*Math.max(0,Math.min(1,pct)),11,999);ctx.fill();ctx.fillStyle='rgba(255,255,255,.86)';ctx.font='900 11px system-ui';ctx.fillText(label,x+w+8,y+10);}

    function loop(now){if(!running)return;const dt=Math.min((now-lastTime)/1000,.033);lastTime=now;update(dt);draw();requestAnimationFrame(loop);}

    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => { const k=e.key.toLowerCase(); if(k==='arrowleft'||k==='a')moveLeft(); if(k==='arrowright'||k==='d')moveRight(); if(k==='arrowup'||k==='w'||k===' ')jump(); if(k==='arrowdown'||k==='s')roll(); });
    let sx=0, sy=0;
    wrap.addEventListener('pointerdown', e => { sx=e.clientX; sy=e.clientY; });
    wrap.addEventListener('pointerup', e => { const dx=e.clientX-sx, dy=e.clientY-sy, ax=Math.abs(dx), ay=Math.abs(dy); if(Math.max(ax,ay)<24)return; if(ax>ay) dx<0?moveLeft():moveRight(); else dy<0?jump():roll(); });

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){const rr=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+rr,y);this.arcTo(x+w,y,x+w,y+h,rr);this.arcTo(x+w,y+h,x,y+h,rr);this.arcTo(x,y+h,x,y,rr);this.arcTo(x,y,x+w,y,rr);this.closePath();return this;};
    }

    startBtn.addEventListener('click', startGame);
    resize();
    draw();
  </script>
</body>
</html>
